# Changelog auto-update — keeps CHANGELOG.md's autogen block in sync with
# merged PR history.
#
# Triggers
#   - nightly cron (07:13 UTC; offset so it does not collide with the top of
#     the hour batch of GH Actions cron jobs)
#   - on every PR `closed` event where `merged == true`
#   - manual workflow_dispatch escape hatch
#
# PR-update strategy
#   The job commits any diff to the long-lived branch
#   `chore/changelog-update`. `peter-evans/create-pull-request` reuses the
#   existing PR if one is open on that branch (label `chore:changelog`); a
#   new one is opened otherwise. Re-runs that produce an empty diff exit 0
#   without touching the branch — see `generate-changelog.ts` --write mode
#   semantics (it short-circuits with a stderr notice when the file already
#   matches the rendered block).
#
# Opt-out: delete the workflow file, or label the open chore PR
# `automation:disabled` and add an `if:` guard here.

name: Changelog auto-update

on:
  schedule:
    - cron: '13 7 * * *'
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: changelog-update
  cancel-in-progress: false

jobs:
  update:
    name: Regenerate CHANGELOG.md
    # Only run on merged PRs (not closed-unmerged); always run for cron / dispatch.
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate CHANGELOG.md
        run: npm run changelog:write
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect diff
        id: diff
        run: |
          if git diff --quiet -- CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "CHANGELOG.md already up to date — skipping PR creation."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update chore PR
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/changelog-update
          base: main
          commit-message: 'chore(changelog): regenerate from merged PRs'
          title: 'chore(changelog): auto-regenerate from merged PRs'
          body: |
            Auto-generated by `.github/workflows/changelog-update.yml`.

            This PR keeps CHANGELOG.md's autogen block in sync with `gh pr list --state merged`. The hand-curated v0.2.0 / v0.1.x narrative above the sentinels is preserved verbatim.

            Re-runs reuse this branch + PR. Close the PR (without merging) to disable for the current cycle; the next nightly run will reopen it if there is still a diff.
          labels: |
            chore:changelog
          delete-branch: false
          author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
          committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
