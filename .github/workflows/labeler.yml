# Auto-apply area-of-change labels to pull requests.
#
# Triggered on pull_request_target (NOT pull_request) so the labeler runs
# with repo-write permissions even on PRs from forks. This is safe because
# the workflow doesn't check out or execute PR code — actions/labeler reads
# the PR file list via the GitHub API only.
#
# Label definitions live in .github/labeler.yml. Pipeline-emitted labels
# (migrator:*, confidence:*, verify:*) are set by other workflows and are
# NOT touched here.

name: PR auto-labeler

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@8558fd74291d67161a8a78ce36a881fa63b766a9 # v5.0.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false  # don't strip labels we didn't add
