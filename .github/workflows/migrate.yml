# Stage 2 — Code generation.
#
# Trigger: a `migrator:plan` PR has been merged. Stage 2 reads the approved
# plan + input + config + reference style, follows prompts/_assembled/generate.md, and
# emits the Playwright TypeScript migration + migration report.
#
# Validation cascade: tsc -> eslint --fix -> playwright parse -> AST-diff
# non-trivial -> evaluate.ts (emits aggregate confidence). If confidence < 0.7,
# verify.yml is triggered for an Opus second-opinion check.
#
# ── Batch multi-input dispatch (ROADMAP item H) ────────────────────────────
# `workflow_dispatch` accepts EITHER `input_path` (single) OR `input_paths`
# (JSON array of N paths). The pipeline expands `input_paths` into a parallel
# matrix — one leg per input. Use the batch form when you want to:
#   • re-roll Stage 2 for a small set of related inputs in one dispatch
#     (e.g. all Selenium-Java inputs after a generate.md prompt edit), or
#   • backfill several abandoned plan PRs without N separate dispatches.
# When BOTH inputs are provided, `input_paths` wins (single-form is a
# convenience alias for the 1-element array case).
#
# Per-input budget guard: each matrix leg checks its own Claude cost AFTER
# the generate step + capture-usage runs. If the leg's cost > per_input_budget_usd
# the guard emits a `::warning::` and `exit 0` — the leg short-circuits all
# downstream validation, evaluate, PR open, and verify-dispatch steps but
# does NOT fail the leg or the workflow. Rationale: a single runaway
# migration should NOT drain budget meant for the rest of the batch, nor
# should it block the surviving legs from producing useful output.
#
# fail-fast=false: a failing migration in one leg does NOT cancel its
# siblings. Stage 2 confidence is per-input; one bad input shouldn't void
# the others' validator-wall verdicts.
# ───────────────────────────────────────────────────────────────────────────

name: Stage 2 — Generate Playwright code

on:
  pull_request:
    types: [closed]
  # Manual trigger for re-running Stage 2 against current main without needing
  # a fresh plan PR cycle. Useful when migrate.yml itself has been patched
  # (gh run rerun uses the workflow YAML from the original trigger commit).
  workflow_dispatch:
    inputs:
      input_path:
        description: 'Path to ONE input file or directory (repo-relative). Use input_paths for batch.'
        required: false
        type: string
      input_paths:
        description: 'JSON array of input paths for batch dispatch, e.g. ["inputs/cypress/foo.cy.js","inputs/selenium-java/Bar.java"]. Wins over input_path when both are set.'
        required: false
        type: string
      plan_path:
        description: 'Path to the approved plan markdown (single-input form only; defaults to outputs/plans/<basename>.md). Ignored for batch — each leg derives its own.'
        required: false
        type: string
      per_input_budget_usd:
        description: 'Per-input Claude budget cap in USD (default 1.50). Matrix leg exits early with ::warning:: when its cost exceeds this. Total batch budget = N × per_input_budget_usd.'
        required: false
        type: string
        default: '1.50'

concurrency:
  # Per-input concurrency on workflow_dispatch so parallel re-runs across
  # DIFFERENT inputs don't collapse into queue-depth-1 cancels. Mirrors
  # PR #139's fix for plan.yml. Observed 2026-06-16: 4 parallel
  # `gh workflow run migrate.yml -f input_path=X` → 2 cancelled before
  # starting because all four shared `pwm-migrate-` group (empty PR
  # number under workflow_dispatch). cancel-in-progress: false only
  # protects in-progress; queued runs get LIFO-bumped.
  #
  # Precedence: pull_request → group by PR number (one PR → one matrix);
  # workflow_dispatch with input_path → per-input lane;
  # workflow_dispatch with input_paths (batch) → group by the JSON array
  # string (whole batch is one matrix; serializing two batches is fine).
  group: pwm-migrate-${{ github.event.pull_request.number || inputs.input_path || inputs.input_paths || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write
  # createWorkflowDispatch for verify.yml (was on the trigger-verify job,
  # now folded into a final matrix step) requires actions: write.
  actions: write

jobs:
  expand-inputs:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'migrator:plan'))
    outputs:
      inputs_json: ${{ steps.expand.outputs.inputs_json }}
      has_inputs: ${{ steps.expand.outputs.has_inputs }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: main

      - id: expand
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          IN_SINGLE: ${{ inputs.input_path }}
          IN_BATCH: ${{ inputs.input_paths }}
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the dispatch into a JSON array of input paths.
          # Precedence: input_paths > input_path > PR body (pull_request trigger).
          # The matrix below expands across the array; the 1-element case
          # collapses to the legacy single-input behaviour, preserving
          # backward compat for every existing caller of this workflow.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${IN_BATCH:-}" ]; then
              # Batch form — validate JSON shape + non-empty array.
              if ! echo "$IN_BATCH" | jq -e 'type == "array" and length > 0' > /dev/null 2>&1; then
                echo "::error::input_paths is not a non-empty JSON array. Got: $IN_BATCH"
                exit 1
              fi
              JSON="$IN_BATCH"
            elif [ -n "${IN_SINGLE:-}" ]; then
              JSON=$(jq -nc --arg p "$IN_SINGLE" '[$p]')
            else
              echo "::error::Either input_path or input_paths must be provided."
              exit 1
            fi
          else
            # pull_request closed trigger — extract from plan PR body.
            BODY=$(gh pr view "$PR_NUMBER" --json body --jq .body)
            INPUT=$(printf '%s\n' "$BODY" | grep -E '^\*\*Input:\*\*' | sed -E 's/.*`([^`]+)`.*/\1/' | head -n1)
            if [ -z "$INPUT" ]; then
              echo "::error::Could not extract input path from plan PR body."
              exit 1
            fi
            JSON=$(jq -nc --arg p "$INPUT" '[$p]')
          fi
          # Existence check for every resolved path.
          while IFS= read -r p; do
            if [ ! -e "$p" ]; then
              echo "::error::input '$p' not found on main"
              exit 1
            fi
          done < <(echo "$JSON" | jq -r '.[]')
          # Single-line compact JSON for matrix expansion.
          COMPACT=$(echo "$JSON" | jq -c '.')
          echo "inputs_json=$COMPACT" >> "$GITHUB_OUTPUT"
          echo "has_inputs=true" >> "$GITHUB_OUTPUT"
          echo "Resolved $(echo "$COMPACT" | jq 'length') input(s) for Stage 2: $COMPACT"

  generate:
    needs: expand-inputs
    if: needs.expand-inputs.outputs.has_inputs == 'true'
    runs-on: ubuntu-latest
    strategy:
      # ROADMAP item H — fail-fast=false: one bad migration leg must NOT
      # cancel its siblings. See top-of-file comment for the full rationale.
      fail-fast: false
      matrix:
        input_path: ${{ fromJSON(needs.expand-inputs.outputs.inputs_json) }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          ref: main
          fetch-depth: 0
          # peter-evans/create-pull-request below opens the code PR; same
          # "Duplicate Authorization header" 400 fix as plan.yml.
          persist-credentials: false

      - name: Guard — parse this leg's input + plan paths
        id: guard
        env:
          INPUT: ${{ matrix.input_path }}
          PLAN_OVERRIDE: ${{ inputs.plan_path }}
        shell: bash
        run: |
          set -euo pipefail
          # Per-leg version of the old `guard` job. `matrix.input_path` is
          # already validated (existence + extraction) by expand-inputs; we
          # just resolve the plan path. plan_path override only applies to
          # the single-input dispatch form — batch dispatches derive each
          # leg's plan from its basename.
          BATCH_COUNT=$(echo '${{ needs.expand-inputs.outputs.inputs_json }}' | jq 'length')
          BASE=$(basename "$INPUT")
          if [ "$BATCH_COUNT" = "1" ] && [ -n "${PLAN_OVERRIDE:-}" ]; then
            PLAN="$PLAN_OVERRIDE"
          else
            PLAN="outputs/plans/$BASE.md"
          fi
          if [ ! -f "$PLAN" ]; then
            echo "::error::Plan file $PLAN not found on main"
            exit 1
          fi
          echo "input_path=$INPUT" >> "$GITHUB_OUTPUT"
          echo "input_basename=$BASE" >> "$GITHUB_OUTPUT"
          echo "plan_path=$PLAN" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Validate plan envelope BEFORE reading plan body (FIRST gate — fail-fast contract)
        shell: bash
        run: |
          set -euo pipefail
          # ROADMAP v1.0 "Plan envelope enforcement": Stage 2 MUST validate
          # the envelope before any prompt assembly, inventory build, or
          # Claude invocation. The envelope is the machine contract that
          # tells Stage 2 which scenarios MUST appear, which POMs/fixtures
          # MUST be produced, and whether the migration is subtractive.
          # If the envelope is invalid we waste $0 of tokens — bail now.
          BASE="${{ steps.guard.outputs.input_basename }}"
          PLAN="${{ steps.guard.outputs.plan_path }}"
          ENV="outputs/plans/${BASE}.envelope.json"
          # Safety net (commits a3a6cc5 + 1d775c3 + 31a2bfa) — derive from
          # markdown when the envelope sidecar is missing. Keeps Stage 2
          # forward-compatible with any plan that pre-dates the dual-output
          # mandate. Does NOT loosen plan-envelope-validate.ts.
          if [ ! -f "$ENV" ]; then
            echo "::warning::Stage 2 envelope $ENV missing — deriving from markdown plan ($PLAN). Stage 1 should have produced this; safety-net engaged."
            npx tsx scripts/derive-envelope.ts --plan "$PLAN" --out "$ENV"
          else
            echo "Stage 2 envelope present at $ENV — proceeding with strict validation."
          fi
          # Strict schema validation — same call as `npm run check:envelope`.
          # Stage 2 reads the envelope alongside the markdown; envelope is
          # canonical for scenario IDs and required file paths (see
          # prompts/_assembled/generate.md "Required reading").
          npx tsx scripts/plan-envelope-validate.ts --envelope "$ENV"
          echo "has_envelope=true" >> "$GITHUB_OUTPUT"
        id: envelope

      - name: Assemble prompt fragments
        shell: bash
        run: |
          set -euo pipefail
          # Expand {{include:_fragments/*.md}} markers in prompts/*.md.
          # Claude reads prompts/_assembled/generate.md (post-expansion).
          npx tsx scripts/assemble-prompts.ts --write

      # ---------------------------------------------------------------------
      # Aider repo-map / Cody RAG pattern: before asking the model to generate
      # new code, hand it a compact inventory of POMs/fixtures/helpers that
      # already exist. This grounds reuse — Claude tends to invent a new
      # `LoginPage` even when one is already present. The block is short
      # (export signatures only, no bodies) to keep token cost low while
      # preserving the surface the model needs to decide reuse-vs-create.
      # ---------------------------------------------------------------------
      - name: Build snippet inventory for Claude grounding
        id: inventory
        shell: bash
        run: |
          set -euo pipefail
          # Extracted from inline bash (95 LOC) to scripts/build-inventory.ts
          # (ts-morph-based, 417 LOC). See commit 01f907d. Same output format;
          # script handles empty-case + missing-dir + parse errors gracefully.
          INV="outputs/.snippets-inventory.md"
          npx tsx scripts/build-inventory.ts --out "$INV"
          echo "inventory_path=$INV" >> "$GITHUB_OUTPUT"

      # Note: Fragment assembly happens in the "Assemble prompt fragments" step
      # above (commit 60c6b51). All 3 prompts (analyze, generate, verify) now
      # contain {{include:_fragments/*.md}} markers and Claude reads the
      # post-expansion copy from prompts/_assembled/. See
      # scripts/assemble-prompts.ts and prompts/_fragments/ for the design.

      - name: Pre-generate DOM grounding (capture snapshot, else offline abstention gate)
        # Makes grounding the DEFAULT, not dark. When MIGRATION_TARGET_URL is set we
        # capture the live a11y tree BEFORE Stage 2 so the generate prompt can inject
        # it as a closed vocabulary (the next step reads $SNAPSHOT). With no SUT we run
        # the offline abstention gate (lever 1) on the plan — a high-confidence pin
        # whose accessible name isn't derivable from the source is a confident
        # hallucination — and fail FAST, before the heavy Stage-2 token spend.
        env:
          MIGRATION_TARGET_URL: ${{ secrets.MIGRATION_TARGET_URL }}
          INPUT_PATH: ${{ steps.guard.outputs.input_path }}
          # Default HARD. Repo var PLAN_ABSTENTION_STRICT=false softens to a warning.
          SOFTEN: ${{ vars.PLAN_ABSTENTION_STRICT == 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.guard.outputs.input_basename }}"
          PLAN="outputs/plans/${BASE}.md"
          SNAPSHOT="outputs/dom-snapshots/${BASE}.yaml"
          # 1) SUT configured + no snapshot yet → capture the accessibility tree now.
          if [ ! -f "$SNAPSHOT" ] && [ -n "${MIGRATION_TARGET_URL:-}" ]; then
            npx playwright install --with-deps chromium >/dev/null 2>&1 || npx playwright install chromium || true
            mkdir -p outputs/dom-snapshots
            echo "::group::dom-snapshot capture of $MIGRATION_TARGET_URL"
            npx tsx scripts/dom-snapshot.ts --url "$MIGRATION_TARGET_URL" --output "$SNAPSHOT" || \
              echo "::warning::dom-snapshot capture failed — falling back to offline mode"
            echo "::endgroup::"
          fi
          # 2) Snapshot present → Stage 2 will read it as a closed vocabulary. Done.
          if [ -f "$SNAPSHOT" ]; then
            echo "DOM grounding: snapshot ready at $SNAPSHOT — Stage 2 reads it as a closed vocabulary."
            exit 0
          fi
          # 3) Offline → abstention gate (HARD by default; human-reviewed plan PR routes a flag back for a trivial fix).
          SRC_ARG=""
          if [ -f "$INPUT_PATH" ]; then SRC_ARG="--source $INPUT_PATH"; fi
          if npx tsx scripts/validate-plan-dom-grounding.ts --plan "$PLAN" $SRC_ARG; then
            exit 0
          fi
          if [ "$SOFTEN" = "true" ]; then
            echo "::warning::Offline abstention gate flagged a confident hallucination — softened by PLAN_ABSTENTION_STRICT=false."
            exit 0
          fi
          echo "::error::Offline abstention gate: a high-confidence pin names a locator not derivable from the source, and there is no DOM snapshot to ground it. Fix the plan (lower confidence + add a hallucination-defense pin, or use a CSS fallback), set MIGRATION_TARGET_URL to capture a snapshot, or set repo var PLAN_ABSTENTION_STRICT=false to soften."
          exit 1

      - name: Run Claude (generate stage)
        # Stage 2 is the heaviest LLM call (Read plan + KB + rules + pwm-blueprint
        # reference + inventory; write spec + Pages + Blocks + fixtures + API
        # wrappers + report). Cypress migrations with max-turns 50 can push
        # 15 min; 30 min is a 2x headroom on the longest observed runtime.
        # Without this cap a stuck inference would burn until GHA's 6h limit.
        timeout-minutes: 30
        env:
          # Trim whitespace + auto-route by token prefix. sk-ant-api → API key
          # (ANTHROPIC_API_KEY); sk-ant-oat → OAuth token (CLAUDE_CODE_OAUTH_TOKEN).
          RAW_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_PATH: ${{ steps.guard.outputs.input_path }}
          PLAN_PATH: ${{ steps.guard.outputs.plan_path }}
          INPUT_BASENAME: ${{ steps.guard.outputs.input_basename }}
          INVENTORY_PATH: ${{ steps.inventory.outputs.inventory_path }}
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d ' \t\n\r')
          PREFIX="${TOKEN:0:12}"
          case "$PREFIX" in
            sk-ant-oat*) export CLAUDE_CODE_OAUTH_TOKEN="$TOKEN" ;;
            sk-ant-api*) export ANTHROPIC_API_KEY="$TOKEN" ;;
            *) echo "::warning::Unknown token prefix '$PREFIX'" ; export ANTHROPIC_API_KEY="$TOKEN" ;;
          esac
          INVENTORY_BLOCK=$(cat "$INVENTORY_PATH")
          # DOM grounding: when the pre-generate step captured a live a11y snapshot,
          # inject it as a CLOSED VOCABULARY so Stage 2 cannot hallucinate locators.
          # Empty (no-op) when offline — behaviour unchanged for snapshot-less runs.
          SNAPSHOT="outputs/dom-snapshots/${INPUT_BASENAME}.yaml"
          if [ -f "$SNAPSHOT" ]; then
            DOM_GROUNDING_BLOCK=$(cat <<DGB
          ## DOM grounding — CLOSED VOCABULARY (read before pinning any locator)

          A live accessibility snapshot of the target was captured at: $SNAPSHOT
          It is the GROUND TRUTH for which roles, accessible names, and labels exist.
          Read it before you choose a locator, and obey:
            - Every getByRole / getByLabel / getByText / getByPlaceholder you emit MUST
              match a node present in the snapshot (same role + accessible name, verbatim casing).
            - If the role/name you were about to use is NOT in the snapshot, DO NOT invent it.
              Fall back to the source selector as CSS via page.locator('...') with a WHY-comment,
              or pick the closest snapshot-backed node.
            - Treat the snapshot as a closed set: prefer its exact accessible names over any
              name you guessed from the source test.
          DGB
          )
          else
            DOM_GROUNDING_BLOCK=""
          fi
          PROMPT=$(cat <<EOF
          You are running Stage 2 of the PWmodernizer pipeline.

          ## STOP — read this before any tool call

          The post-generate pwm-blueprint conformance validator HARD-FAILS on the patterns
          below. FOUR consecutive Stage 2 runs (27257207504, 27258160013, 27260892741,
          27262055163) have committed them. Internalise the FULL shape (spec + Page +
          fixture together) BEFORE you read any other file:

          \`\`\`ts
          // ❌ FORBIDDEN: outputs/tests/*.spec.ts that imports from @playwright/test
          //    AND ignores the page-object fixture (uses raw \`page\` + \`page.goto\`).
          //    Run 27262055163 rejected for exactly this: helpers were correct but
          //    the spec didn't consume them.
          import { test, expect } from "@playwright/test";       // ❌ wrong source
          test("…", async ({ page }) => {                         // ❌ raw page param
            await page.goto("/some/path");                        // ❌ goto in spec
            await expect(page.getByText("x")).toBeVisible();      // ❌ assertion not on Page method
          });
          \`\`\`

          \`\`\`ts
          // ✅ REQUIRED: outputs/tests/<kebab>.spec.ts (the ONLY accepted shape)
          //    Three integrated pieces — write ALL THREE for every migration.
          //
          // 1) The spec — imports test/expect from @fixtures/base.fixture,
          //    pulls the page-object fixture by name, never touches raw \`page\`.
          import { test, expect } from "@fixtures/base.fixture";
          test("…", async ({ promptJupiterPage }) => {            // ✅ fixture name as param
            await test.step("open the page", async () => {
              await promptJupiterPage.open();                     // ✅ Page owns navigation
            });
            await test.step("the result is visible", async () => {
              await promptJupiterPage.expectResultVisible("John"); // ✅ assertion as Page method
            });
          });
          \`\`\`

          \`\`\`ts
          // 2) The PageClass — outputs/helper/page-object/pages/<kebab>.page.ts
          //    Extends the pre-existing BasePage. NO own constructor. Locator fields
          //    use .describe('[LABEL] …'). expect() inside page methods takes [LABEL] msg.
          import { expect, type Locator } from "@playwright/test";  // ✅ helpers can do this
          import { BasePage } from "@page-object/basepage";
          import { DIALOG_BOXES_PATH } from "@test-data/prompt-jupiter";

          const LABEL = "PromptJupiter";

          export class PageClassPromptJupiter extends BasePage {
            readonly url = DIALOG_BOXES_PATH;
            readonly buttonPrompt: Locator =
              this.page.locator("#my-prompt").describe(\`[\${LABEL}] Prompt button\`);

            async waitForPageLoad(): Promise<void> {
              await expect(this.buttonPrompt, \`[\${LABEL}] Prompt button visible\`).toBeVisible();
            }
            async expectResultVisible(name: string): Promise<void> {
              await expect(this.page.getByText(name), \`[\${LABEL}] result text\`).toBeVisible();
            }
          }
          \`\`\`

          \`\`\`ts
          // 3) The base.fixture.ts EXTENSION — outputs/helper/fixtures/base.fixture.ts
          //    Pre-existing shell on disk. EXTEND it (add a fixture entry per Page);
          //    do NOT rewrite or re-emit the whole file.
          //    Re-export test + expect at the bottom unchanged.
          import { test as base, expect } from "@playwright/test"; // ✅ ONLY this file
          import { PageClassPromptJupiter } from "@page-object/pages/prompt-jupiter.page";

          type Fixtures = { promptJupiterPage: PageClassPromptJupiter };
          const test = base.extend<Fixtures>({
            promptJupiterPage: async ({ page }, use) =>
              use(new PageClassPromptJupiter(page)),
          });
          export { test, expect };
          \`\`\`

          All THREE pieces ship together. The spec MUST pull its Page through the fixture
          (not via raw \`page\`); the Page MUST extend BasePage (so \`open()\` is inherited);
          the fixture MUST inject the Page (so the spec can name it as a param).

          ## Your task

          Read prompts/_assembled/generate.md — that's your full system prompt. Follow
          it exactly. The plan was already human-approved; execute it
          faithfully.

          ## Input for this run

          - Source input: $INPUT_PATH (may be a single file OR a directory)
          - Approved plan: $PLAN_PATH
          - Output spec path: outputs/tests/$INPUT_BASENAME

          If $INPUT_PATH is a directory, treat all source files in it as ONE migration unit. The plan describes the migration of the whole unit; preserve every test, page object, and helper that the plan acknowledges.
          - Output report path: outputs/reports/$INPUT_BASENAME.md

          ## Context to load (in this order)

          1. prompts/_assembled/generate.md — your task spec (READ FIRST)
          2. $PLAN_PATH — the approved plan; follow it literally
          3. config/migration-rules.md — style + structure contract (v0.2.0 pwm-blueprint target)
          4. config/knowledge-base.md — anti-pattern + API translations (includes \`pwm-blueprint/architecture/*\` KB IDs)
          5. examples/reference/pwm-blueprint/ — real-company style anchor:
             - tests/account.sign-in.spec.ts — spec shape (single import source = @fixtures/base.fixture)
             - helper/page-object/basepage.ts + helper/page-object/accounts.page.ts — PageClass discipline
             - helper/fixtures/base.fixture.ts — the ONLY file allowed to import from @playwright/test
             - helper/api/accounts.api.ts — API wrappers for data prep
             - helper/utilities/logger.ts + helper/test-data/urls.ts — utility/test-data shape
             - helper/<layer>/CLAUDE.md × 7 — per-layer discipline (api / fixtures / page-object / test-data / utilities / actions / browser) — read the one matching each file you write
             - docs/ARCHITECTURE.md + docs/CLAUDE.md — full architecture reasoning
          6. $INPUT_PATH — the source to migrate

          ## Existing project surface — reuse before inventing

          $INVENTORY_BLOCK

          Hard constraint: If a POM or fixture in the inventory matches the
          plan's required POMs/fixtures, REUSE it. Do NOT create a duplicate
          with a slightly different name (e.g. inventory has \`AccountsPage\` →
          do not introduce \`SignInPage\` or \`AccountsPageV2\`). If the plan
          explicitly mandates a new POM that overlaps an existing one,
          extend the existing file rather than forking.

          $DOM_GROUNDING_BLOCK

          ## Deliverables — v0.2.0 pwm-blueprint architecture (write ONLY these paths)

          Spec (always):
          - outputs/tests/$INPUT_BASENAME — migrated Playwright TS spec
            * MUST import \`test\` + \`expect\` from \`@fixtures/base.fixture\` (NEVER \`@playwright/test\`).
            * MUST call \`pageObject.open()\` for navigation (NEVER \`page.goto()\` directly).
            * test bodies use \`test.step(...)\` for each scenario phase.

          Baseline scaffolding (ALREADY EXISTS on main — DO NOT recreate, only EXTEND if a fixture entry is needed):
          - outputs/helper/fixtures/base.fixture.ts — present. Single source of \`test\` + \`expect\`. EXTEND with page-object fixture entries via \`test.extend<{...}>({...})\` when the plan declares Pages; otherwise leave untouched.
          - outputs/helper/page-object/basepage.ts — present. Abstract BasePage with \`open()\` that calls \`this.page.goto(this.url)\` + \`waitForPageLoad()\`. Import via \`import { BasePage } from "@page-object/basepage"\`.
          - outputs/helper/page-object/baseblock.ts — present. Abstract BaseBlock that takes \`readonly root: Locator\`. Import via \`import { BaseBlock } from "@page-object/baseblock"\` when blocks are needed.
          - outputs/helper/utilities/logger.ts — present. Default-export \`logger\` with info/warn/error/debug. Import via \`import logger from "@logger"\`.

          Per-migration files (write IF the plan's required* arrays list them — paths are LITERAL):
          - outputs/helper/page-object/pages/<name>.page.ts — \`PageClass<Name>\` extends BasePage with \`readonly\` locator fields; each locator carries \`.describe('[LABEL] ...')\`; every page-method \`expect(...)\` has a \`[LABEL]\` message arg.
          - outputs/helper/page-object/blocks/<name>.block.ts — when a section reaches ~5+ locators / 3+ methods / 3+ pages.
          - outputs/helper/api/<name>.api.ts — API wrappers (data prep — NEVER UI-prep).
          - outputs/helper/actions/<name>.ts — cross-page flows (when the journey crosses 2+ Pages).
          - outputs/helper/utilities/<verb>-<noun>.ts — pure utilities (verb-prefixed: parse*, get*, calculate*, verify*, generate*).
          - outputs/helper/test-data/<name>.ts — constants only (URLs, ids, LABEL_* prefixes, cookies).
          - outputs/helper/types/{external,internal}/<name>.ts — type shapes.

          Import paths inside helper/spec files MUST use the tsconfig path aliases
          (relative \`../\` imports across helper boundaries are forbidden by the
          pwm-blueprint conformance validator):
          - @fixtures/base.fixture  → outputs/helper/fixtures/base.fixture
          - @page-object/...        → outputs/helper/page-object/...
          - @api/...                → outputs/helper/api/...
          - @actions/...            → outputs/helper/actions/...
          - @utilities/...          → outputs/helper/utilities/...
          - @test-data/...          → outputs/helper/test-data/...
          - @types/...              → outputs/helper/types/...
          - @logger                 → outputs/helper/utilities/logger

          DO NOT write outputs/reports/<anything>.md — the deterministic report is computed by scripts/evaluate.ts post-validation. Anything you put there is overwritten.
          DO NOT write outside outputs/. The tsconfig rootDir is outputs/; outputs/tests/ AND outputs/helper/ are both inside it.
          DO NOT modify inputs/, config/, or prompts/.

          ## Runtime config the generated spec runs against

          A playwright config already exists at outputs/tests/playwright.config.ts. Key points:
          - baseURL is read from MIGRATION_TARGET_URL env var (defaults to http://localhost:3000). Use RELATIVE URLs in the Page's \`open()\` method (e.g. \`await this.page.goto(this.url)\` where \`url\` is \`/login\` from \`@test-data/urls\`) — NEVER an absolute \`https://...\`. \`page.goto()\` lives in the Page class, NOT in the spec. Specs call \`pageObject.open()\` — the spec NEVER calls \`page.goto()\` (KB pwm-blueprint/architecture/page-goto-in-spec).
          - actionTimeout: 5_000. If a plan Risk callout calls out longer backend latency (e.g. 7s rate-limit cooldown), emit a per-assertion timeout override ({ timeout: 10_000 }) with a WHY-comment citing the plan question — never bump the global timeout.
          - 3 projects: chromium, firefox, webkit. Generate browser-agnostic specs (no browser-specific shortcuts).
          - retain-on-failure for trace + screenshot + video — don't add explicit page.screenshot() unless the plan asked for it.

          ## Hard rules

          - Web-first assertions only
          - No waitForTimeout, force:true, .nth(N), test.only, test.skip,
            page.pause(), :any, as unknown as, console.log
          - Add attribution comment at top:
            // Migrated by PWmodernizer on YYYY-MM-DD from {source}. See $PLAN_PATH for plan.
          - If the plan looks wrong, FAIL LOUDLY in the report — do NOT
            silently fix it.
          EOF
          )
          # See plan.yml for the stream-json + tee + extract-claude-usage
          # rationale. usage.json is consumed by evaluate.ts later.
          mkdir -p outputs/.usage
          # max-turns history:
          #   20 (initial) -> hit consistently on 5-file Selenium migrations
          #   40 (June 2026) -> covered bad-Playwright + simple Selenium
          #   50 (research-backed bump, 2026-06-16) - cypress wishlist
          #     migration with API extraction + Block + Page split + spec +
          #     report + envelope = 12-14 file writes; with 6+ Read tool calls
          #     for context (KB / rules / pwm-blueprint ref / plan / inventory /
          #     baseline) the 40-turn budget was tight, and a single retry of
          #     a malformed file pushed it over. Observed in run 27601093922.
          claude \
            --model claude-sonnet-4-6 \
            --max-turns 50 \
            --print \
            --output-format stream-json \
            --verbose \
            --permission-mode acceptEdits \
            "$PROMPT" \
            > /tmp/claude-migrate-events.ndjson
          # NB: direct `>` redirect, NOT `| tee`. Sonnet + stream-json
          # with verbose output can SIGPIPE the LLM if the terminal can't
          # keep up. Same root cause as verify.yml. Direct redirect is
          # the documented stable pattern for capturing stream-json.

      - name: Diagnose Claude crash (on failure)
        if: failure()
        shell: bash
        run: |
          # When Claude exits non-zero (transient Anthropic outage, OAuth
          # 401, max-turns hit, SIGPIPE) the workflow log only shows the
          # bash command echo'd and then "exit code 1" — stdout went to
          # the ndjson file and stderr is mostly silent for Claude CLI.
          # This step dumps ndjson size + last 5 events + final event
          # type so the failure mode is attributable in one pass.
          # See verify.yml for the same pattern + PR #126 motivation.
          EVENTS=/tmp/claude-migrate-events.ndjson
          echo "::group::Stage 2 (migrate) crash diagnostics"
          if [ ! -e "$EVENTS" ]; then
            echo "ndjson file does not exist — Claude CLI never wrote stdout"
          elif [ ! -s "$EVENTS" ]; then
            echo "ndjson file exists but is empty — Claude exited before first event"
          else
            echo "ndjson: $(wc -c < "$EVENTS" | tr -d ' ') bytes, $(wc -l < "$EVENTS" | tr -d ' ') events"
            echo "--- LAST 5 EVENTS ---"
            tail -5 "$EVENTS" || true
            echo "--- FINAL EVENT TYPE ---"
            tail -1 "$EVENTS" | jq -r '.type // "unknown"' 2>/dev/null || echo "could not parse final event as JSON"
          fi
          echo "::endgroup::"

      - name: Capture Claude usage stats (cost tracking)
        id: capture_usage
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.guard.outputs.input_basename }}"
          if [ ! -s /tmp/claude-migrate-events.ndjson ]; then
            echo "::warning::No claude events captured — skipping usage extract"
            exit 0
          fi
          FINAL=$(grep -E '"usage"' /tmp/claude-migrate-events.ndjson | tail -1 || true)
          if [ -z "$FINAL" ]; then
            echo "::warning::No event with usage object — skipping"
            exit 0
          fi
          echo "$FINAL" > /tmp/claude-migrate-result.json
          npx tsx scripts/extract-claude-usage.ts \
            --from /tmp/claude-migrate-result.json \
            --out "outputs/.usage/${BASE}-migration.json" \
            --tolerant

      - name: Per-input budget guard (ROADMAP item H)
        id: budget_guard
        shell: bash
        env:
          # `inputs.per_input_budget_usd` is empty for the pull_request
          # trigger (not a workflow_dispatch); fall back to the same default
          # the dispatch declares so the guard is consistent across triggers.
          PER_INPUT_BUDGET_USD: ${{ inputs.per_input_budget_usd || '1.50' }}
        run: |
          set -euo pipefail
          # ──────────────────────────────────────────────────────────────
          # Reads the usage JSON written by the previous step (the same
          # file Stage 2's evaluate.ts later consumes — NOT a separate
          # tracker) and computes USD cost via scripts/metrics.ts' price
          # table. If the leg's cost exceeds per_input_budget_usd we
          # emit a ::warning::, write `over_budget=true` to step output,
          # and `exit 0`. The fail-fast=false matrix + downstream
          # `if: steps.budget_guard.outputs.over_budget != 'true'` gates
          # short-circuit the rest of the leg WITHOUT failing the job.
          # Sibling legs continue running on their own budgets.
          # Per-input means each leg has its own cap; total batch
          # budget = N × PER_INPUT_BUDGET_USD.
          # ──────────────────────────────────────────────────────────────
          BASE="${{ steps.guard.outputs.input_basename }}"
          USAGE_FILE="outputs/.usage/${BASE}-migration.json"
          echo "over_budget=false" >> "$GITHUB_OUTPUT"
          if [ ! -f "$USAGE_FILE" ]; then
            echo "::warning::No usage file at $USAGE_FILE — budget guard cannot evaluate; allowing leg to proceed."
            exit 0
          fi
          # Inline budget evaluator. Imports computeCostUsd from scripts/metrics.ts
          # so the price table stays single-sourced — if Anthropic re-prices
          # Sonnet, only metrics.ts changes.
          COST_JSON=$(npx tsx --eval "
            import { readFileSync } from 'node:fs';
            import { computeCostUsd } from './scripts/metrics.ts';
            const usage = JSON.parse(readFileSync('${USAGE_FILE}', 'utf8'));
            const cost = computeCostUsd(usage);
            process.stdout.write(JSON.stringify({ cost, model: usage.model }));
          ")
          COST=$(echo "$COST_JSON" | jq -r '.cost // empty')
          MODEL=$(echo "$COST_JSON" | jq -r '.model // "unknown"')
          if [ -z "$COST" ] || [ "$COST" = "null" ]; then
            echo "::warning::Could not compute USD cost for model '$MODEL' (no pricing entry). Budget guard allows leg to proceed."
            exit 0
          fi
          CAP="$PER_INPUT_BUDGET_USD"
          # bc handles fractional comparison; awk fallback would also work.
          OVER=$(awk -v c="$COST" -v cap="$CAP" 'BEGIN { print (c > cap) ? "1" : "0" }')
          printf 'Leg %s: cost=$%.4f USD (model=%s); cap=$%s USD\n' "$BASE" "$COST" "$MODEL" "$CAP"
          if [ "$OVER" = "1" ]; then
            echo "::warning::Per-input budget guard tripped for $BASE: cost \$$COST > cap \$$CAP. Short-circuiting downstream steps for this leg (no failure cascade). Sibling legs continue."
            echo "over_budget=true" >> "$GITHUB_OUTPUT"
          else
            echo "Per-input budget guard OK for $BASE (cost \$$COST ≤ cap \$$CAP)."
          fi

      - name: Materialize LOW-confidence pins from DOM-probe
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # ROADMAP v1.0 "LOW-confidence pin rules" closure step.
          # The DOM-probe report at outputs/reports/<base>-dom-probe.json
          # tags every locator with HIGH/MEDIUM/LOW. This step materialises
          # the LOW verdicts back into source: inserts a WHY-comment above
          # each LOW pin, and when a fallback rule matches (e.g. getByText
          # of a button label → getByRole) it also rewrites the locator.
          #
          # The probe report is only produced when MIGRATION_TARGET_URL is
          # set AND the dom_ground step ran successfully. If the report is
          # missing this step silently no-ops (the script handles the
          # exists-check and exits 0). It's safe to run on every migration
          # because the script is idempotent — already-materialised lines
          # are skipped.
          BASE="${{ steps.guard.outputs.input_basename }}"
          REPORT="outputs/reports/${BASE}-dom-probe.json"
          if [ ! -f "$REPORT" ]; then
            echo "No DOM-probe report at $REPORT — LOW-pin materialization skipped (no-op)."
            exit 0
          fi
          npm run materialize:low-pins -- --basename "$BASE"

      # ---------------------------------------------------------------------
      # Aider lint-and-test feedback loop: collect ALL validation failures
      # in one pass (typecheck + eslint + playwright parse), and if any are
      # present, hand them back to Claude with the inventory + plan + the
      # original deliverable contract for ONE bounded surgical-fix pass.
      # Bound = 1 retry, max-turns = 20 (fewer than the generate budget of
      # 50 — surgical fixes are smaller than greenfield generation).
      # ---------------------------------------------------------------------
      - name: Auto-rewrite @types/ → @type-defs/ path alias (KB-1.1.27 pre-flight)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # pwm-blueprint v0.2.0+ renamed the local-types path alias from `@types/*`
          # to `@type-defs/*` to avoid colliding with the npm DefinitelyTyped
          # scope (TS6137). Sonnet sometimes still emits the old `@types/`
          # prefix on complex multi-fixture migrations when the input or plan
          # references it. KB-1.1.27 covers the anti-pattern.
          #
          # PR #169 (2026-06-17) initially stripped the prefix entirely. That
          # was wrong — stripping produces `external/cart-api` which doesn't
          # resolve to anything (TS2307), since the file actually lives at
          # `outputs/helper/types/external/cart-api.ts` and is reachable only
          # through the alias. This step REWRITES the alias instead.
          #
          # Idempotent: silently no-ops when no @types/ prefix in code.
          FIXED=0
          while IFS= read -r f; do
            if grep -qE "from ['\"]@types/" "$f" 2>/dev/null; then
              sed -E -i "s|from (['\"])@types/([^'\"]+)\\1|from \\1@type-defs/\\2\\1|g" "$f"
              FIXED=$((FIXED + 1))
            fi
          done < <(find outputs/tests outputs/helper -type f -name '*.ts' 2>/dev/null \
                     | grep -v '/_legacy-v0.1.x/' || true)
          if [ "$FIXED" -gt 0 ]; then
            echo "::notice::Rewrote @types/ → @type-defs/ alias in $FIXED file(s) (KB-1.1.27)."
          fi

      - name: Validate generated code (lint+test+parse)
        id: validate
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set +e
          ERR="outputs/.lint-errors.md"
          : > "$ERR"
          STATUS=0
          # eslint + playwright --list are scoped to THIS leg's spec so a sibling
          # migration's broken/unparseable spec can't fail (or mask) this one — the
          # wall verdict must be a property of THIS migration, not the whole
          # accumulated tree (run-order independence). tsc stays project-wide (the
          # spec imports the shared @fixtures barrel, so it can't compile alone).
          THIS_SPEC=$(npx tsx scripts/resolve-output-spec.ts --input-basename "${{ steps.guard.outputs.input_basename }}" || true)

          echo "### tsc --noEmit" >> "$ERR"
          echo '```' >> "$ERR"
          TSC_OUT=$(npx tsc --noEmit -p outputs/tests/tsconfig.json 2>&1)
          TSC_RC=$?
          echo "$TSC_OUT" >> "$ERR"
          echo '```' >> "$ERR"
          if [ "$TSC_RC" -ne 0 ]; then STATUS=1; fi
          echo "" >> "$ERR"

          echo "### eslint --fix" >> "$ERR"
          echo '```' >> "$ERR"
          # eslint --fix mutates files. After autofix, anything still flagged
          # is a real lint failure that needs Claude's attention.
          ESLINT_OUT=$(npx eslint --fix "${THIS_SPEC:-outputs/tests}" 2>&1)
          ESLINT_RC=$?
          echo "$ESLINT_OUT" >> "$ERR"
          echo '```' >> "$ERR"
          if [ "$ESLINT_RC" -ne 0 ]; then STATUS=1; fi
          echo "" >> "$ERR"

          echo "### playwright test --list" >> "$ERR"
          echo '```' >> "$ERR"
          # Playwright interprets the bare glob as a test-name regex (`Nothing
          # to repeat`). Enumerate spec files via `find` so we pass literal
          # paths.
          if [ -n "$THIS_SPEC" ]; then SPECS=("$THIS_SPEC"); else mapfile -t SPECS < <(find outputs/tests -type f -name '*.spec.ts'); fi
          if [ "${#SPECS[@]}" -eq 0 ]; then
            echo "(no .spec.ts files found under outputs/tests)" >> "$ERR"
            PW_RC=0
          else
            PW_OUT=$(npx playwright test --list "${SPECS[@]}" 2>&1)
            PW_RC=$?
            echo "$PW_OUT" >> "$ERR"
          fi
          echo '```' >> "$ERR"
          if [ "$PW_RC" -ne 0 ]; then STATUS=1; fi
          echo "" >> "$ERR"

          if [ "$STATUS" -eq 0 ]; then
            # Clean — discard the report so downstream skip-conditions can use
            # exists-check semantics if they want.
            rm -f "$ERR"
            echo "Validation clean."
          else
            echo "::warning::Validation found errors — see outputs/.lint-errors.md (will retry once)."
            # Diagnostic visibility — print the lint-errors.md content directly so
            # `gh run view --log` shows what Sonnet's first pass produced. Without
            # this, debugging "retry hit max-turns" failures requires re-running
            # locally with the exact same Sonnet output (impossible — that output
            # lives only on the ephemeral runner).
            echo "::group::outputs/.lint-errors.md"
            cat "$ERR"
            echo "::endgroup::"
          fi
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run Claude (fix lint errors)
        # Fix-lint is a constrained edit pass (read the .lint-errors.md report,
        # patch the failing files in place). 10 min is generous — typical
        # runtime is 2-4 min. Without this cap a stuck inference would burn
        # until GHA's 6h limit.
        timeout-minutes: 10
        if: steps.budget_guard.outputs.over_budget != 'true' && steps.validate.outputs.status != '0'
        env:
          # Same token-prefix routing as the generate step — keep consistent.
          RAW_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_PATH: ${{ steps.guard.outputs.input_path }}
          PLAN_PATH: ${{ steps.guard.outputs.plan_path }}
          INPUT_BASENAME: ${{ steps.guard.outputs.input_basename }}
          INVENTORY_PATH: ${{ steps.inventory.outputs.inventory_path }}
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d ' \t\n\r')
          PREFIX="${TOKEN:0:12}"
          case "$PREFIX" in
            sk-ant-oat*) export CLAUDE_CODE_OAUTH_TOKEN="$TOKEN" ;;
            sk-ant-api*) export ANTHROPIC_API_KEY="$TOKEN" ;;
            *) echo "::warning::Unknown token prefix '$PREFIX'" ; export ANTHROPIC_API_KEY="$TOKEN" ;;
          esac
          INVENTORY_BLOCK=$(cat "$INVENTORY_PATH")
          ERRORS_BLOCK=$(cat outputs/.lint-errors.md)
          # Pre-check qa-master conformance + AST-diff + plan-vs-code coverage
          # NOW, before handing the error block to Sonnet. Fix-lint #2 idea: if
          # the spec also fails downstream gates, surface them HERE so the
          # surgical fix addresses everything at once instead of bouncing through
          # multiple validate→retry cycles. Soft-collect — failures here are
          # appended to ERRORS_BLOCK as additional context, not exit.
          BASE="${{ needs.guard.outputs.input_basename }}"
          {
            echo "### qa-master architecture conformance (pre-check)"
            echo '```'
            npx tsx scripts/validate-qa-master-conformance.ts \
              --root outputs \
              --input-basename "$BASE" 2>&1 || true
            echo '```'
            echo ""
            echo "### plan-vs-code coverage (pre-check)"
            echo '```'
            ENV="outputs/plans/${BASE}.envelope.json"
            if [ -f "$ENV" ]; then
              npx tsx scripts/plan-envelope-validate.ts \
                --envelope "$ENV" \
                --code "outputs/tests" 2>&1 || true
            fi
            echo '```'
          } >> outputs/.lint-errors.md
          ERRORS_BLOCK=$(cat outputs/.lint-errors.md)
          PROMPT=$(cat <<EOF
          Stage 2 produced code that failed validation. Read the errors below
          and fix the generated code while preserving plan adherence.

          The errors block includes:
          1. tsc + eslint + playwright parse errors (the immediate validate failure)
          2. qa-master conformance pre-check (downstream gate, included so your
             surgical fix addresses architecture issues at the same time)
          3. plan-vs-code coverage pre-check (orphan/missing scenario pins)

          Fix all three categories in one pass — bouncing through validate →
          retry → conformance → retry burns turns without addressing the
          actual misalignment.

          ## Plan (must still satisfy)

          $PLAN_PATH

          ## All validation errors (lint + conformance + coverage)

          $ERRORS_BLOCK

          ## Existing project surface

          $INVENTORY_BLOCK

          Surgical fixes only — do NOT regenerate the entire spec.

          ## pwm-blueprint baseline overrides plan when they conflict

          If lint errors include either:
          - \`KB pwm-blueprint/architecture/page-goto-in-spec\` (\`no-restricted-syntax\` on \`page.goto\`)
          - \`KB pwm-blueprint/architecture/import-source\` (\`no-restricted-imports\` on \`@playwright/test\`)

          You MUST create the pwm-blueprint baseline scaffolding for THIS migration,
          even if the plan envelope's \`requiredPOMs\` is empty. The plan is a
          v0.1.x-shaped baseline; pwm-blueprint conformance is the v0.2.0 contract.

          Concretely:
          1. Create \`outputs/helper/page-object/pages/<kebab>.page.ts\` —
             \`PageClass<Name>\` extends BasePage with \`readonly url\` set from
             a constant in \`outputs/helper/test-data/<kebab>.ts\` (mutate or create);
             no own constructor; \`waitForPageLoad()\` asserts at least one anchor
             locator is visible (use \`expect(this.<locator>, '[LABEL] WHY').toBeVisible()\`).
          2. Extend \`outputs/helper/fixtures/base.fixture.ts\` with a fixture
             entry: \`<name>Page: async ({ page }, use) => use(new PageClassName(page))\`.
          3. In the spec: switch \`async ({ page })\` to \`async ({ <name>Page })\`,
             replace \`page.goto(...)\` with \`await <name>Page.open()\`.

          Do NOT silently fix it — write the helper files. The plan's
          \`requiredPOMs: []\` is informational, not a ban; pwm-blueprint mandates
          at least one PageClass per spec.

          ## Other plan/code conflicts

          For any other lint error revealing a plan/code conflict (e.g., plan
          said use getByRole but linter says raw locator), prefer the plan's
          intent.

          ## Modification scope

          You MAY modify files under both \`outputs/tests/\` AND \`outputs/helper/\`
          (helpers needed to satisfy the pwm-blueprint overrides above).
          EOF
          )
          claude \
            --model claude-sonnet-4-6 \
            --max-turns 20 \
            --print \
            --permission-mode acceptEdits \
            "$PROMPT"

      - name: Re-validate after fix retry
        if: steps.budget_guard.outputs.over_budget != 'true' && steps.validate.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail
          FAIL=0
          # Scope eslint + --list to THIS leg's spec (sibling-independent); tsc project-wide.
          THIS_SPEC=$(npx tsx scripts/resolve-output-spec.ts --input-basename "${{ steps.guard.outputs.input_basename }}" || true)
          echo "::group::tsc"
          npx tsc --noEmit -p outputs/tests/tsconfig.json || FAIL=1
          echo "::endgroup::"
          echo "::group::eslint"
          npx eslint --fix "${THIS_SPEC:-outputs/tests}" || FAIL=1
          echo "::endgroup::"
          echo "::group::playwright parse"
          if [ -n "$THIS_SPEC" ]; then SPECS=("$THIS_SPEC"); else mapfile -t SPECS < <(find outputs/tests -type f -name '*.spec.ts'); fi
          if [ "${#SPECS[@]}" -gt 0 ]; then
            npx playwright test --list "${SPECS[@]}" || FAIL=1
          fi
          echo "::endgroup::"
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Validation still failing after 1 retry. Remaining errors:"
            if [ -f outputs/.lint-errors.md ]; then
              # Re-emit a fresh copy of remaining errors as annotations.
              { npx tsc --noEmit -p outputs/tests/tsconfig.json 2>&1 || true; } | sed -n '1,50p' | while IFS= read -r LINE; do
                echo "::error::$LINE"
              done
            fi
            exit 1
          fi
          echo "Validation clean after retry."

      - name: AST-diff-not-trivial check
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the spec emitted FOR THIS input by basename and pass the FILE.
          # Passing the directory let resolveSourceFile pick the first .spec.ts in
          # readdir order (same wrong-spec defect as the evaluate step); the
          # resolver handles cross-language renames (EmployeesTest.java →
          # employees.spec.ts) and falls back to the directory only if it finds none.
          OUT_SPEC=$(npx tsx scripts/resolve-output-spec.ts \
            --input-basename "${{ steps.guard.outputs.input_basename }}" || true)
          npx tsx scripts/ast-diff-trivial-check.ts \
            --input "${{ steps.guard.outputs.input_path }}" \
            --output "${OUT_SPEC:-outputs/tests}"

      - name: Plan-vs-code coverage check (LPW contract closure — unified envelope --code mode)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # ROADMAP v1.0 "Plan envelope enforcement": every scenarios[].id in
          # the envelope must appear as exactly one `// plan:scenario=<id>`
          # comment in the generated spec. This is the unified post-Stage-2
          # gate via plan-envelope-validate.ts --code: schema + scenario pin
          # coverage + requiredPOMs/Fixtures existence + subtractive import
          # discipline, all in one strict call.
          BASE="${{ steps.guard.outputs.input_basename }}"
          ENV="outputs/plans/${BASE}.envelope.json"
          OUT_DIR="outputs/tests"
          # Primary gate: unified --code mode (the new --code mode per ROADMAP).
          npx tsx scripts/plan-envelope-validate.ts \
            --envelope "$ENV" \
            --code "$OUT_DIR"
          # Defense-in-depth: dedicated plan-code-coverage.ts sibling validator
          # carries identical checks plus orphan/duplicate-pin annotations on
          # each violating line. Kept to preserve commit a3a6cc5+1d775c3+31a2bfa
          # gate posture; both must pass.
          # Sibling validator — same dir-mode rationale as AST-diff above.
          # Sonnet may rename input basename on cross-language migrations.
          npx tsx scripts/plan-code-coverage.ts \
            --envelope "$ENV" \
            --output "outputs/tests"

      - name: Assertion coverage (source-equivalence)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        env:
          # Default WARN (surfaces dropped/weakened assertions + a coverage number).
          # Set repo var ASSERTION_COVERAGE_STRICT=true to hard-block on a gap.
          STRICT_FLAG: ${{ vars.ASSERTION_COVERAGE_STRICT == 'true' && '--strict' || '' }}
        run: |
          set -euo pipefail
          # Source-equivalence: every envelope expectedAssertion carrying a literal
          # anchor (text/regex) must be REFLECTED in the emitted tree. Catches the
          # dropped/weakened/mis-targeted assertion a clean-but-wrong migration ships.
          # Lenient (token-overlap) so a correct generalisation is not flagged.
          BASE="${{ steps.guard.outputs.input_basename }}"
          ENV="outputs/plans/${BASE}.envelope.json"
          OUT_SPEC=$(npx tsx scripts/resolve-output-spec.ts --input-basename "$BASE" || true)
          npx tsx scripts/assertion-coverage.ts \
            --envelope "$ENV" \
            --output "${OUT_SPEC:-outputs/tests}" $STRICT_FLAG

      - name: Helper-usage gate (PR #126 SDET finding → static check)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Catches the exact class of bug PR #126 SDET found: an exported
          # API helper (clearWishlist) was emitted but never wired into the
          # spec, so the test leaked state across runs. The validator wall
          # (typecheck, eslint, pwm-blueprint conformance) didn't flag it
          # because each file was independently valid — only the missing
          # cross-file wiring was wrong.
          #
          # Warn-only here: a healthy long-tail of migrations may emit
          # genuinely orphan helpers (manual review / refactor candidate)
          # without it being a block-severity defect. Promote to --strict
          # after observing N real runs where every warning was a true
          # positive. See scripts/validate-helper-usage.ts header for the
          # full rationale + calibration corpus link.
          #
          # In warn mode (no --strict) the validator exits 0 even when it
          # finds unused exports; findings surface as ::warning:: lines on
          # the run summary. No `|| true` needed — the script handles it.
          npx tsx scripts/validate-helper-usage.ts

      - name: pwm-blueprint architecture conformance (v0.2.0 default)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Defense-in-depth gate for pwm-blueprint architecture compliance:
          # - no @playwright/test imports in specs (only base.fixture.ts may)
          # - no constructor on PageClass/BlockClass subclasses
          # - every locator field has .describe('[LABEL] ...')
          # - every expect() inside page methods has [LABEL] message arg
          # - no relative cross-helper imports (path aliases only)
          # - type-prefix locator names (warn, not block)
          # - no page.goto in specs (Page.open() owns navigation)
          # - utilities have matching unit tests (warn)
          # Scoped to THIS input — outputs/tests/ accumulates legacy v0.1.x
          # specs from prior runs and the validator would reject those even
          # though they're not this run's responsibility.
          BASE="${{ steps.guard.outputs.input_basename }}"
          # --block-defects: the W1/W2/W5/W15 quality-defect classes (the ones
          # implicated in the measured ~33%-acceptable rate) now BLOCK in the
          # pipeline, not just warn. Default validator behaviour + calibration
          # are unchanged (they run without the flag).
          npx tsx scripts/validate-pwm-blueprint-conformance.ts \
            --root outputs \
            --input-basename "$BASE" \
            --block-defects

      - name: TODO/FIXME discipline (PR #151 verify-CR root cause)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Bare TODOs in generated POMs / specs were the block-severity hit
          # CR raised against #151 AddCookiesJupiterTest — the migration report
          # claimed "Forbidden patterns: None" while a `// TODO:` lived in the
          # committed page object. §8 of generate.md forbids TODO/FIXME unless
          # the comment carries a recognized justification (plan Q-id, fragile
          # selector, add testid, ticket id). This validator enforces it before
          # the report ever ships.
          npx tsx scripts/validate-todo-discipline.ts \
            --root outputs/tests \
            --root outputs/helper

      - name: Auto-correct report Output line (Bullet 12 pre-flight)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Sonnet repeatedly copies the input filename into the report's
          # `Output:` line instead of the kebab-cased emitted filename
          # (sel-python iters 3-7, 2026-06-10/11). Bullet 12 prompt
          # strengthening (PR #76) hasn't been enough. Auto-correct the line
          # to match the actually-emitted spec BEFORE the validator runs.
          # The validator still hard-fails the residual cases (LOC mismatch,
          # wholesale paragraph copy-paste) — this pre-flight only fixes the
          # filename + LOC numbers, which are mechanical and unambiguous.
          BASE="${{ steps.guard.outputs.input_basename }}"
          REPORT="outputs/reports/${BASE}.md"
          if [ ! -f "$REPORT" ]; then
            echo "No report at $REPORT yet (evaluate.ts will write it later) — skip."
            exit 0
          fi
          # Resolve the spec emitted FOR THIS input by basename (shared resolver;
          # NOT `find … | head -1`, which picked the lexically-first prior
          # migration). `|| true` so the empty-OUT_SPEC skip below still handles
          # the no-spec case under `set -e`.
          OUT_SPEC=$(npx tsx scripts/resolve-output-spec.ts --input-basename "$BASE" || true)
          if [ -z "$OUT_SPEC" ]; then
            echo "::warning::No emitted spec found under outputs/tests — skip pre-flight."
            exit 0
          fi
          ACTUAL_BASENAME=$(basename "$OUT_SPEC")
          ACTUAL_LOC=$(wc -l < "$OUT_SPEC" | tr -d ' ')
          # Replace any `outputs/tests/<old>.spec.ts (<old> LOC)` pattern with
          # the corrected line. The match is permissive (any *.spec.ts basename)
          # so it works for snake_case, PascalCase, or already-kebab carryover.
          # sed -i works on Linux runners.
          # The report may wrap the path in backticks (Sonnet's default
          # markdown style: `\`outputs/tests/x.spec.ts\` (29 LOC)`). The regex
          # tolerates optional backticks + makes the `(N LOC)` clause optional
          # so naked filename mentions get corrected too.
          # Character class includes `/` to match subdirectory paths Sonnet
          # sometimes copies from prior reports (e.g.
          # `outputs/tests/_legacy-v0.1.x/using_selenium_tests.spec.ts`).
          # Without `/` in the class, the regex bailed at the first `/` after
          # `outputs/tests/` and the auto-correct silently no-op'd — the
          # downstream metric self-consistency gate then failed because the
          # report still pointed at the wrong spec. Observed 2026-06-17 on
          # cypress checkout-flow PR #173 verify START OVER reasons.
          sed -E -i "s#\`?outputs/tests/[A-Za-z0-9._/-]+\\.spec\\.ts\`?( \\([0-9]+ LOC\\))?#\`outputs/tests/${ACTUAL_BASENAME}\` (${ACTUAL_LOC} LOC)#g" "$REPORT"
          echo "Pre-flight: report Output line set to outputs/tests/${ACTUAL_BASENAME} (${ACTUAL_LOC} LOC)"

      - name: Report-metric self-consistency (Bullet 12 defense-in-depth)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Cross-check the migration report's claimed filename + LOC against
          # the actually-emitted spec. Catches Sonnet copy-pasting from another
          # report (PR #13 PromptJupiter root cause: report said
          # using_selenium_tests.spec.ts(29 LOC) while actual was
          # prompt-jupiter.spec.ts(52 LOC)). Hard-fail — block-severity bug.
          # The pre-flight step above auto-corrects the filename + LOC; this
          # validator still catches deeper inconsistencies (selector counts,
          # web-first rate arithmetic, paragraph copy-paste).
          BASE="${{ steps.guard.outputs.input_basename }}"
          REPORT="outputs/reports/${BASE}.md"
          INPUT="${{ steps.guard.outputs.input_path }}"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::No report at $REPORT — skipping (evaluate.ts will write it)"
            exit 0
          fi
          npx tsx scripts/validate-report-metrics.ts \
            --report "$REPORT" \
            --input "$INPUT"

      - name: Output secret scan (mirror Stage 0)
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Defense in depth: Claude may hallucinate a real prod URL/key into
          # generated output. Mirror Stage 0's input scan. Block on hit.
          declare -a PATTERNS=(
            'AKIA[0-9A-Z]{16}|AWS access key'
            'sk_live_[0-9a-zA-Z]{24,}|Stripe live secret key'
            'pk_live_[0-9a-zA-Z]{24,}|Stripe live publishable key'
            'ghp_[A-Za-z0-9]{36}|GitHub PAT'
            'github_pat_[A-Za-z0-9_]{82}|GitHub fine-grained PAT'
            'xox[abprs]-[A-Za-z0-9-]{10,}|Slack token'
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}|Anthropic API key'
            'sk-proj-[A-Za-z0-9_-]{40,}|OpenAI project key'
          )
          BLOCK=0
          for f in $(find outputs/tests -type f -name '*.ts'); do
            for entry in "${PATTERNS[@]}"; do
              PAT="${entry%|*}"
              LABEL="${entry#*|}"
              if grep -nqE "$PAT" "$f"; then
                BLOCK=$((BLOCK + 1))
                grep -nE "$PAT" "$f" | while IFS= read -r MATCH; do
                  LINE="${MATCH%%:*}"
                  echo "::error file=$f,line=$LINE::Generated output contains possible real $LABEL — Claude hallucinated a real credential. Block."
                done
              fi
            done
          done
          if [ "$BLOCK" -gt 0 ]; then
            echo "::error::$BLOCK output secret leaks detected. Reject migration."
            exit 1
          fi
          echo "Output secret scan clean."

      - name: DOM-ground locators against MIGRATION_TARGET_URL (opt-in, no-op if unset)
        id: dom_ground
        if: steps.budget_guard.outputs.over_budget != 'true'
        env:
          MIGRATION_TARGET_URL: ${{ secrets.MIGRATION_TARGET_URL }}
          DOM_GROUND_STRICT: ${{ vars.DOM_GROUND_STRICT || '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${MIGRATION_TARGET_URL:-}" ]; then
            echo "dom_probe_status=skipped" >> "$GITHUB_OUTPUT"
            echo "MIGRATION_TARGET_URL secret unset — dom-ground skipped (no SUT to probe)"
            exit 0
          fi
          # Install Playwright browser binary (needed only when grounding is on).
          npx playwright install --with-deps chromium
          BASE="${{ steps.guard.outputs.input_basename }}"
          REPORT="outputs/reports/${BASE}-dom-probe.json"
          DG_EXIT=0
          # Resolve the spec emitted FOR THIS input (basename-scoped; the old
          # `find outputs/tests/$BASE` treated the input basename as a directory,
          # so cross-language renames silently probed nothing). --probe-tree makes
          # the probe follow fixtures into the POMs where pwm-blueprint keeps every
          # locator — without it the spec has zero locators and grounding can
          # never confirm, leaving the 0.69 cap a permanent floor even with a SUT.
          OUT_SPEC=$(npx tsx scripts/resolve-output-spec.ts --input-basename "$BASE" || true)
          for f in $OUT_SPEC; do
            echo "::group::dom-ground probe (emitted tree) for $f"
            npx tsx scripts/dom-ground.ts \
              --url "${MIGRATION_TARGET_URL}" \
              --probe "$f" \
              --probe-tree \
              --report "$REPORT" \
              --mode live || DG_EXIT=$?
            echo "::endgroup::"
            # Aggregate exit: 0 stays 0; 1 wins over 0; 2 wins over 1
            if [ "$DG_EXIT" -eq 2 ]; then
              echo "::warning::dom-ground unreachable for $f (exit 2) — falling back to no-grounding mode"
              echo "dom_probe_status=unreachable" >> "$GITHUB_OUTPUT"
              break
            fi
          done
          if [ "$DG_EXIT" -eq 1 ]; then
            echo "dom_probe_status=fail" >> "$GITHUB_OUTPUT"
            echo "::warning::dom-ground reports at least one locator did not resolve uniquely — verify stage will read $REPORT"
          elif [ "$DG_EXIT" -eq 0 ]; then
            echo "dom_probe_status=pass" >> "$GITHUB_OUTPUT"
          fi
          # Soft gate by default: surface the warning + persist the report, let
          # verify decide. Set DOM_GROUND_STRICT=true (repo secret/variable) to
          # promote to hard gate — Stage 2 fails this step on any not-found or
          # ambiguous match. Recommended only after SUT calibration is in place
          # so the gate isn't tripped by flaky DOM.
          if [ "${DOM_GROUND_STRICT:-}" = "true" ] && [ "$DG_EXIT" -ne 0 ]; then
            echo "::error::dom-ground hard gate (DOM_GROUND_STRICT=true): exit $DG_EXIT — failing the migrate job"
            exit "$DG_EXIT"
          fi

      - name: Archive Sonnet output on ANY failure (diagnostics)
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: stage2-failed-output-${{ steps.guard.outputs.input_basename }}
          path: |
            outputs/.lint-errors.md
            outputs/tests/**/*.ts
            outputs/helper/**/*.ts
            outputs/reports/${{ steps.guard.outputs.input_basename }}.md
          if-no-files-found: ignore
          retention-days: 7

      - name: Evaluate migration (metrics + confidence)
        id: evaluate
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Resolve the spec generated FOR THIS input by basename. Sonnet may
          # rename across languages (EmployeesTest.java → employees.spec.ts), so
          # the resolver matches the kebab/rename forms and falls back to the
          # lexically-first spec only when nothing matches. This replaces
          # `find … | head -1`, which on a flat outputs/tests/ ALWAYS returned the
          # lexically-first prior migration — feeding evaluate.ts the wrong spec,
          # so confidence + the report Source→Output header described another
          # file. (Observed 2026-06-17 cypress checkout-flow PR #173 verify START
          # OVER: Output path referenced a legacy file.)
          OUT_SPEC=$(npx tsx scripts/resolve-output-spec.ts \
            --input-basename "${{ steps.guard.outputs.input_basename }}")
          USAGE_FILE="outputs/.usage/${{ steps.guard.outputs.input_basename }}-migration.json"
          USAGE_ARG=""
          [ -f "$USAGE_FILE" ] && USAGE_ARG="--usage $USAGE_FILE"
          # shellcheck disable=SC2086 # USAGE_ARG intentionally word-split
          CONFIDENCE=$(npx tsx scripts/evaluate.ts \
            --input "${{ steps.guard.outputs.input_path }}" \
            --plan "${{ steps.guard.outputs.plan_path }}" \
            --output "$OUT_SPEC" \
            --report-out "outputs/reports/${{ steps.guard.outputs.input_basename }}.md" \
            $USAGE_ARG)
          echo "confidence=$CONFIDENCE" >> "$GITHUB_OUTPUT"
          echo "Migration confidence: $CONFIDENCE"

      - name: Track output variability (Sonnet determinism signal)
        if: steps.budget_guard.outputs.over_budget != 'true'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          # Append a row to outputs/.usage/variability-log.jsonl with hashes
          # of input + plan + every emitted output file. Post-hoc analysis
          # of N runs against the same input+plan shows whether Sonnet's
          # outputs converge (deterministic — pipeline reliable) or diverge
          # (model-side noise dominates — needs calibration). continue-on-error
          # because variability tracking is diagnostic, not a gate.
          npx tsx scripts/track-output-variability.ts \
            --input "${{ steps.guard.outputs.input_path }}" \
            --plan "${{ steps.guard.outputs.plan_path }}" \
            --basename "${{ steps.guard.outputs.input_basename }}" \
            --run-id "${{ github.run_id }}" \
            --confidence "${{ steps.evaluate.outputs.confidence }}" \
            --attempt "1"

      - name: Determine confidence label
        id: clabel
        if: steps.budget_guard.outputs.over_budget != 'true'
        shell: bash
        run: |
          set -euo pipefail
          CONF="${{ steps.evaluate.outputs.confidence }}"
          if [ "$(echo "$CONF < 0.7" | bc -l)" = "1" ]; then
            echo "label=confidence:low" >> "$GITHUB_OUTPUT"
          else
            echo "label=confidence:high" >> "$GITHUB_OUTPUT"
          fi

      # See plan.yml: a default-GITHUB_TOKEN PR does not trigger danger.yml /
      # lint-output.yml, so the code PR would sit UNSTABLE without its gates. The
      # GitHub App token (opt-in via repo var PWM_APP_ID + secret
      # PWM_APP_PRIVATE_KEY) is a distinct actor that DOES trigger them; falls
      # back to github.token when unset (unchanged behaviour).
      - name: Generate bot app token (for PR that triggers downstream gates)
        id: app_token
        if: steps.budget_guard.outputs.over_budget != 'true' && vars.PWM_APP_ID != ''
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PWM_APP_ID }}
          private-key: ${{ secrets.PWM_APP_PRIVATE_KEY }}

      - name: Open code PR
        id: open_pr
        if: steps.budget_guard.outputs.over_budget != 'true'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          token: ${{ steps.app_token.outputs.token || github.token }}
          branch: migrator/code-${{ steps.guard.outputs.input_basename }}
          base: main
          commit-message: 'feat(migration): generated code for ${{ steps.guard.outputs.input_path }}'
          title: '[Migration code] ${{ steps.guard.outputs.input_path }}'
          labels: |
            migrator:code
            ${{ steps.clabel.outputs.label }}
          body: |
            ## Stage 2 — Generated migration

            **Input:** `${{ steps.guard.outputs.input_path }}`
            **Plan:** `${{ steps.guard.outputs.plan_path }}`${{ github.event_name == 'pull_request' && format(' (merged in #{0})', github.event.pull_request.number) || ' (workflow_dispatch trigger)' }}
            **Migration report:** `outputs/reports/${{ steps.guard.outputs.input_basename }}.md`
            **Aggregate confidence:** ${{ steps.evaluate.outputs.confidence }}
            **Triggered by:** `${{ github.event_name }}`

            ### Validation gates (all passed)

            - ✅ `tsc --noEmit` (strict mode)
            - ✅ `eslint-plugin-playwright` (autofixed)
            - ✅ `playwright test --list` (parses as spec)
            - ✅ AST-diff-not-trivial (real change, not cosmetic)

            ### Review checklist

            - [ ] Open migration report — smell-scan deltas + selector quality
            - [ ] If confidence < 0.7, `verify.yml` will (or already has) flagged disagreements
            - [ ] Compare to original input — does new test catch the same bugs?
            - [ ] Locator-level: are LOW-confidence translations correct?

            ### Caveats

            - Pure-LLM migration without DOM grounding hallucinates roles.
              Set `MIGRATION_TARGET_URL` secret to enable playwright-mcp grounding (v1).
            - Generated tests pass static gates but may flake. Run
              `npx playwright test` against staging before merging.

      - name: Strip stale confidence:* label (replace, don't stack)
        # peter-evans/create-pull-request adds the new label without
        # stripping the prior one when the PR already exists from an
        # earlier dispatch. Without this step, an update that flips a
        # PR from low to high confidence leaves both labels stacked.
        # Same bug class as PR #166 fixed for verify:* labels.
        # Observed 2026-06-17 cypress checkout-flow PR #173.
        if: steps.budget_guard.outputs.over_budget != 'true' && steps.open_pr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.open_pr.outputs.pull-request-number }}
          NEW_LABEL: ${{ steps.clabel.outputs.label }}
        shell: bash
        run: |
          set -euo pipefail
          STALE_LABEL="confidence:low"
          [ "$NEW_LABEL" = "confidence:low" ] && STALE_LABEL="confidence:high"
          gh pr edit "$PR_NUMBER" --remove-label "$STALE_LABEL" 2>/dev/null || true

      - name: Trigger verify.yml on low confidence (per-leg)
        if: steps.budget_guard.outputs.over_budget != 'true' && steps.evaluate.outputs.confidence < '0.7'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            // Folded into the matrix job (was the standalone `trigger-verify`
            // job pre-batch). Each leg dispatches its own verify run when its
            // confidence < 0.7. Pre-batch behaviour: 1 trigger per dispatch;
            // batch behaviour: up to N triggers per dispatch (one per leg
            // that fell below the threshold). Sibling legs that passed do
            // not dispatch verify.
            //
            // Pass the Stage 2 code branch as pr_branch so verify can read the
            // generated spec + helpers BEFORE they merge to main. Without this,
            // verify checks out main and both subagents return START OVER ("no
            // outputs/tests/<basename>.spec.ts exists") — a spurious verdict,
            // since Stage 2 just emitted those files on the PR branch.
            // The branch name is deterministic: peter-evans/create-pull-request
            // builds it as `migrator/code-${INPUT_BASENAME}`.
            const inputBasename = '${{ steps.guard.outputs.input_basename }}';
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'verify.yml',
              ref: 'main',
              inputs: {
                input_basename: inputBasename,
                generate_confidence: '${{ steps.evaluate.outputs.confidence }}',
                pr_branch: `migrator/code-${inputBasename}`,
              },
            });
