# Stage 1 — Migration planning.
#
# Trigger: push touching inputs/** OR manual workflow_dispatch.
# Claude reads the input + config + reference style, follows prompts/_assembled/analyze.md,
# writes outputs/plans/<basename>.md. Opens PR labeled `migrator:plan`.
# Stage 2 (migrate.yml) fires when the labeled PR is merged.

name: Stage 1 — Plan migration

on:
  push:
    branches-ignore:
      - 'migrator/**'
      - 'claude/**'
    paths:
      - 'inputs/**'
  workflow_dispatch:
    inputs:
      input_path:
        description: 'Path to one input file (repo-relative) to re-plan'
        required: true
        type: string
  # Fired by regenerate-dispatch.yml when a reviewer comments `/regenerate`
  # on a closed/open plan PR. Carries input_path + freeform feedback in
  # client_payload.slash_command.args.* (see regenerate-dispatch.yml header).
  repository_dispatch:
    types: [regenerate-plan]

concurrency:
  # Per-input concurrency on workflow_dispatch so parallel dispatches with
  # DIFFERENT input_paths don't get GitHub's queue-depth-1 collapse (newer
  # dispatches push older queued ones into 'cancelled'). Push events still
  # group by ref because they batch all changed inputs in a single matrix
  # job and per-input grouping would be a no-op there.
  #
  # Observed 2026-06-16: 4 parallel `gh workflow run plan.yml -f input_path=X`
  # → 2 cancelled before starting (queue collapse). Per-input grouping fixes
  # it: each input_path becomes its own concurrency lane.
  group: pwm-plan-${{ github.event_name == 'workflow_dispatch' && inputs.input_path || github.event_name == 'repository_dispatch' && github.event.client_payload.slash_command.args.named.input_path || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write # claude-code-action needs this for OIDC bits.

jobs:
  detect-changed-inputs:
    runs-on: ubuntu-latest
    outputs:
      inputs_json: ${{ steps.detect.outputs.inputs_json }}
      has_inputs: ${{ steps.detect.outputs.has_inputs }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 2

      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          # Group changed files into "test units" — either a single file
          # (inputs/<framework>/<file>) or a directory of files
          # (inputs/<framework>/<test-name>/). Selenium tests often span
          # multiple files (POMs, helpers); group those by parent dir.
          group_to_unit() {
            # stdin: newline-separated paths; stdout: unique "units"
            jq -Rsc '
              split("\n")
              | map(select(length > 0))
              | map(split("/")
                | if length >= 4 and (.[0] == "inputs")
                  then (.[0:3] | join("/"))  # multi-file dir: inputs/<framework>/<test-name>
                  else (join("/"))            # single file: inputs/<framework>/<file>
                  end)
              | unique
            '
          }
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ inputs.input_path }}"
            if [ ! -e "$INPUT" ]; then
              echo "::error::input_path '$INPUT' not found (must be file or dir)"
              exit 1
            fi
            JSON=$(jq -nc --arg p "$INPUT" '[$p]')
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            # /regenerate flow — input_path comes from client_payload, written
            # by regenerate-dispatch.yml's static-args. Skip git diff entirely.
            INPUT='${{ github.event.client_payload.slash_command.args.named.input_path }}'
            if [ -z "$INPUT" ] || [ ! -e "$INPUT" ]; then
              echo "::error::repository_dispatch client_payload missing or invalid input_path: '$INPUT'"
              exit 1
            fi
            JSON=$(jq -nc --arg p "$INPUT" '[$p]')
          else
            # Skip _provenance/ directories (license + KB-mapping docs, not tests)
            # and _stress/ adversarial fixtures (intentionally bad-shape inputs).
            JSON=$(git diff --name-only HEAD^ HEAD -- 'inputs/**' | grep -vE '(^|/)_(provenance|stress)(/|$)' | group_to_unit)
          fi
          echo "inputs_json=$JSON" >> "$GITHUB_OUTPUT"
          if [ "$(echo "$JSON" | jq 'length')" -gt 0 ]; then
            echo "has_inputs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_inputs=false" >> "$GITHUB_OUTPUT"
          fi

  plan:
    needs: detect-changed-inputs
    if: needs.detect-changed-inputs.outputs.has_inputs == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        input_path: ${{ fromJSON(needs.detect-changed-inputs.outputs.inputs_json) }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          # peter-evans/create-pull-request later in this job sets its own
          # Authorization header; without persist-credentials=false the
          # checkout-stashed AUTHORIZATION extraheader collides with peter-evans'
          # and GitHub returns "Duplicate header: Authorization" + HTTP 400 on
          # the next git fetch/push. Seen in plan.yml run 26951267594.
          persist-credentials: false

      - name: Compute idempotency key
        id: idempotency
        shell: bash
        run: |
          set -euo pipefail
          INPUT="${{ matrix.input_path }}"
          BASENAME=$(basename "$INPUT")
          if [ -d "$INPUT" ]; then
            # Multi-file unit: hash all tracked files in dir.
            HASH=$(git ls-tree -r HEAD "$INPUT" | sha256sum | awk '{print $1}')
            echo "is_dir=true" >> "$GITHUB_OUTPUT"
          else
            # Single-file: hash the file content as before.
            HASH=$(git rev-parse "HEAD:$INPUT" 2>/dev/null || echo "missing")
            echo "is_dir=false" >> "$GITHUB_OUTPUT"
          fi
          LABEL="migrator:plan:${HASH:0:12}"
          echo "input_basename=$BASENAME" >> "$GITHUB_OUTPUT"
          echo "label=$LABEL" >> "$GITHUB_OUTPUT"

      - name: Stage 0 — Pre-flight input sanity + secret scan
        id: preflight
        shell: bash
        run: |
          set -euo pipefail
          INPUT="${{ matrix.input_path }}"
          # For dir inputs (multi-file), recursively scan all text source files.
          # For file inputs, scan just the file.
          if [ -d "$INPUT" ]; then
            mapfile -t SCAN_FILES < <(find "$INPUT" -type f \( -name '*.ts' -o -name '*.js' -o -name '*.java' -o -name '*.py' -o -name '*.json' -o -name '*.yaml' -o -name '*.yml' -o -name '*.md' \))
          else
            SCAN_FILES=("$INPUT")
          fi
          # ---- Input sanity gate (Risk 4 — full) ----
          # Fail-fast BEFORE spending tokens on Claude when input is unmigrable.
          # Thresholds derived from agent research (NVIDIA RULER on effective
          # Claude context degradation past 50%; Playwright "monolith" anecdote
          # of 2500 LOC / ~80 KB as practical upper bound; chars/4 token estimate
          # is canonical OpenAI heuristic, conservative for English code).
          TOTAL_BYTES=0
          TOTAL_CHARS=0
          HAS_TEST_MARKER=0
          BAD_ENCODING=()
          for FILE in "${SCAN_FILES[@]}"; do
            SZ=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
            TOTAL_BYTES=$((TOTAL_BYTES + SZ))
            CHARS=$(wc -m < "$FILE")
            TOTAL_CHARS=$((TOTAL_CHARS + CHARS))
            # Encoding check: ubuntu-latest ships `file` (binutils);
            # mime-encoding must be utf-8, us-ascii, or binary-of-known-text.
            # `file --mime-encoding -b` returns just the encoding label.
            ENC=$(file --mime-encoding -b "$FILE" 2>/dev/null || echo "unknown")
            case "$ENC" in
              utf-8|us-ascii|utf-8-binary) ;; # OK
              binary)
                # binary may legitimately appear for files with embedded null bytes
                # (rare in test code); flag but allow if test markers present
                BAD_ENCODING+=("$FILE:$ENC")
                ;;
              *)
                BAD_ENCODING+=("$FILE:$ENC")
                ;;
            esac
            # Min-content heuristic: must look like a test file somewhere in the unit.
            if grep -qE '(\b(test|it|describe|cy\.|page\.)\b)|@Test\b|\bdef test_' "$FILE"; then
              HAS_TEST_MARKER=1
            fi
          done
          # Size floor: 200B (empty/stub). Upper bound moved to token-based gate
          # below — bytes over-reject boilerplate that tokenizes small (per agent
          # research: 150KB boilerplate can tokenize to 20K tokens).
          if [ "$TOTAL_BYTES" -lt 200 ]; then
            echo "::error::Input too small ($TOTAL_BYTES bytes < 200). Empty or stub file."
            exit 1
          fi
          # Token estimate cap: chars/4 ≈ tokens for typical English+code mix.
          # 25000-token cap leaves headroom for KB catalog + system prompt + few-shot examples.
          EST_TOKENS=$((TOTAL_CHARS / 4))
          if [ "$EST_TOKENS" -gt 25000 ]; then
            echo "::error::Input ~$EST_TOKENS estimated tokens > 25000 cap. Effective Claude context degrades past ~50% of 1M claim (NVIDIA RULER); split into smaller units."
            exit 1
          fi
          if [ "$HAS_TEST_MARKER" -eq 0 ]; then
            echo "::error::Input contains no test markers (test/it/describe/@Test/def test_/cy./page.). Not a recognizable test file."
            exit 1
          fi
          if [ "${#BAD_ENCODING[@]}" -gt 0 ]; then
            for entry in "${BAD_ENCODING[@]}"; do
              echo "::warning::File encoding suspect: $entry (expected utf-8 or us-ascii). May cause grep / Claude tokenizer surprises."
            done
          fi
          echo "Input sanity: $TOTAL_BYTES bytes, ~$EST_TOKENS tokens, ${#SCAN_FILES[@]} file(s), test markers present."
          # ---- Secret scan (continues below) ----
          # Detect real prod tokens in input. Test placeholders (`xxx`, `<TODO>`,
          # `.test`/`.example` domains, `${{secrets.*}}`) are allowed — the plan
          # stage will recommend extracting them to env vars. We only flag tokens
          # that look like they could be real prod credentials.
          # Pattern list intentionally conservative — false positives waste reviewer time.
          declare -a PATTERNS=(
            'AKIA[0-9A-Z]{16}|AWS access key'
            'sk_live_[0-9a-zA-Z]{24,}|Stripe live secret key'
            'pk_live_[0-9a-zA-Z]{24,}|Stripe live publishable key'
            'ghp_[A-Za-z0-9]{36}|GitHub personal access token'
            'github_pat_[A-Za-z0-9_]{82}|GitHub fine-grained PAT'
            'xox[abprs]-[A-Za-z0-9-]{10,}|Slack token'
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}|Anthropic API key'
            'sk-proj-[A-Za-z0-9_-]{40,}|OpenAI project key'
          )
          FOUND=0
          echo "## Stage 0 — Pre-flight secret scan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Input: \`$INPUT\` (${#SCAN_FILES[@]} file(s) scanned)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          for FILE in "${SCAN_FILES[@]}"; do
            for entry in "${PATTERNS[@]}"; do
              PAT="${entry%|*}"
              LABEL="${entry#*|}"
              if MATCHES=$(grep -nE "$PAT" "$FILE" 2>/dev/null); then
                FOUND=$((FOUND + 1))
                while IFS= read -r MATCH; do
                  LINE="${MATCH%%:*}"
                  echo "::warning file=$FILE,line=$LINE::Possible real $LABEL detected — Stage 1 plan should extract this to env var"
                  echo "- :warning: \`$FILE\` line $LINE — $LABEL" >> "$GITHUB_STEP_SUMMARY"
                done <<< "$MATCHES"
              fi
            done
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "- :white_check_mark: No real-looking prod credentials detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Note:** Pre-flight does not block — Stage 1 plan will recommend extraction. Block manually if any match is a real credential that must be revoked NOW." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "found_count=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Skip if plan PR with this hash already exists
        id: dedup
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # /regenerate flow forces re-run: reviewer has explicitly asked for
          # another pass, so the closed PR carrying the matching hash label
          # MUST NOT block. The new PR will reuse the same hash label and
          # will be opened alongside the closed one.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Forced regeneration via /regenerate — bypassing dedup."
            exit 0
          fi
          # Risk 3 (abandon migration flow): the dedup must NOT block a fresh
          # Stage 1 run when the only PR with this hash label was closed-
          # unmerged. Reviewer closed it because the plan was wrong, and the
          # next push of the same input should produce a new plan PR.
          #
          # We keep the dedup for OPEN PRs (the new push is concurrent with a
          # plan still in review — opening another would be noise) and for
          # MERGED PRs (the plan was accepted; re-opening would create churn).
          # Only CLOSED-unmerged is "abandoned" and allowed to fall through.
          EXISTING=$(gh pr list --state all --label "${{ steps.idempotency.outputs.label }}" --json state --jq '[.[] | select(.state == "OPEN" or .state == "MERGED")] | length')
          if [ "$EXISTING" -gt 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage 0 input pre-flight
        id: input_preflight
        if: steps.dedup.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # ---------------------------------------------------------------
          # Risk 4 closure — fail GRACEFULLY before any Claude API call
          # when the input file is structurally unmigrable. Three failure
          # modes were previously untested and would all silently waste an
          # entire Claude run before surfacing the real problem:
          #
          #   (a) Empty input — `git diff --name-only` returned a path but
          #       the file body is 0 bytes (deleted-then-re-added, broken
          #       merge, accidental `> file` redirect). Claude would read
          #       0 bytes and hallucinate an entire plan from thin air.
          #   (b) Massive input — a 5000+ LOC monolith blows past the
          #       analyze stage's max-turns=12 (and migrate stage's
          #       max-turns=20), OR fills enough context that effective
          #       attention degrades (NVIDIA RULER on long-context
          #       Claude). The pipeline burns the run and produces a
          #       truncated, unusable plan.
          #   (c) Non-UTF8 encoding — Selenium Java files copy-pasted from
          #       Windows tooling can carry a BOM or Windows-1252 bytes.
          #       bash grep behavior on mixed-encoding input is undefined;
          #       Claude's tokenizer mangles such bytes. Catch + tell the
          #       user to iconv.
          #
          # This is the Stage 0 INPUT gate. The earlier "Stage 0 —
          # Pre-flight input sanity + secret scan" step (above the dedup
          # block) does a coarser, secret-focused pass; THIS step is the
          # canonical Risk 4 gate per the deferred-risk closure spec.
          # Placement AFTER dedup is intentional — when the dedup decides
          # to skip, the input never reaches Claude regardless of its
          # shape, so revalidating it would burn CI minutes for no gain.
          # Placement BEFORE setup-node / npm ci is also intentional —
          # the input checks need only POSIX tools (stat, wc, file, grep)
          # that ubuntu-latest already ships; failing here saves ~40 s of
          # node toolchain install on bad inputs.
          # ---------------------------------------------------------------
          INPUT_PATH="${{ matrix.input_path }}"
          # Resolve to a flat file list. Directory inputs (multi-file
          # Selenium units grouped as inputs/<framework>/<test-name>/) are
          # aggregated; size/LOC totals roll up across all source files,
          # encoding is checked per file, and at least one file in the
          # unit must carry a test declaration for the content-sanity
          # gate to pass. Single-file inputs are a 1-element list.
          if [ -d "$INPUT_PATH" ]; then
            mapfile -t FILES < <(find "$INPUT_PATH" -type f \( -name '*.ts' -o -name '*.js' -o -name '*.java' -o -name '*.py' \))
          else
            FILES=("$INPUT_PATH")
          fi

          # Check 1 — Existence.
          # WHY: the dedup step's `gh pr list` could match a stale label
          # whose underlying input was since removed from the working
          # tree (rebase, force-push, manual rm). Without this gate the
          # next checks would fail with cryptic `stat: cannot stat`
          # noise instead of a clear "file missing" error.
          if [ ! -e "$INPUT_PATH" ]; then
            MSG="::error::Input file ${INPUT_PATH} does not exist on disk. Was it removed or renamed since the trigger commit?"
            echo "$MSG"
            {
              echo "## Stage 0 input pre-flight — FAILED"
              echo ""
              echo "**Reason:** input \`${INPUT_PATH}\` missing on disk."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          if [ "${#FILES[@]}" -eq 0 ]; then
            MSG="::error::Input file ${INPUT_PATH} is empty - cannot generate a migration plan from 0 bytes."
            echo "$MSG"
            {
              echo "## Stage 0 input pre-flight — FAILED"
              echo ""
              echo "**Reason:** input directory \`${INPUT_PATH}\` contains no source files (.ts/.js/.java/.py)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Aggregate counters for the size gate + final summary line.
          TOTAL_BYTES=0
          TOTAL_LOC=0
          TEST_COUNT=0
          BAD_ENC=""
          PRIMARY_ENC="utf-8"
          for FILE in "${FILES[@]}"; do
            SZ=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE")
            TOTAL_BYTES=$((TOTAL_BYTES + SZ))
            LC=$(wc -l < "$FILE" | tr -d ' ')
            TOTAL_LOC=$((TOTAL_LOC + LC))
            ENC=$(file --mime-encoding -b "$FILE" 2>/dev/null || echo "unknown")
            case "$ENC" in
              utf-8|us-ascii)
                # Track the dominant non-ASCII encoding for the summary.
                if [ "$ENC" = "utf-8" ]; then PRIMARY_ENC="utf-8"; fi
                ;;
              binary)
                # `binary` from `file` on a 0-byte file is the empty-file
                # signal; that's handled by Check 2 below.
                if [ "$SZ" -gt 0 ]; then
                  BAD_ENC="${BAD_ENC}${FILE}=${ENC} "
                fi
                ;;
              *)
                BAD_ENC="${BAD_ENC}${FILE}=${ENC} "
                PRIMARY_ENC="$ENC"
                ;;
            esac
            # Content sanity counter — accumulate hits across all files
            # so a directory-input only needs ONE file with a marker.
            if grep -cE '(\btest[[:space:]]*\()|(\bit[[:space:]]*\()|(\bdef[[:space:]]+test_)|(@Test\b)' "$FILE" > /tmp/_pwm_grep_count 2>/dev/null; then
              FILE_HITS=$(cat /tmp/_pwm_grep_count)
              TEST_COUNT=$((TEST_COUNT + FILE_HITS))
            fi
          done

          # Check 2 — Size lower bound (empty input).
          # WHY: prevents the "Claude reads 0 bytes, hallucinates a plan
          # from the filename alone" failure mode. We check TOTAL_BYTES
          # rather than per-file because a directory input is empty in
          # the meaningful sense only when ALL files inside are empty.
          if [ "$TOTAL_BYTES" -le 0 ]; then
            MSG="::error::Input file ${INPUT_PATH} is empty - cannot generate a migration plan from 0 bytes."
            echo "$MSG"
            {
              echo "## Stage 0 input pre-flight — FAILED"
              echo ""
              echo "**Reason:** \`${INPUT_PATH}\` is 0 bytes. Claude cannot plan a migration from an empty file."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Check 3 — Size upper bound (5000 LOC / 200 KB).
          # WHY: Stage 1 (plan.yml) caps Claude at max-turns=12 and
          # Stage 2 (migrate.yml) at max-turns=20. A 5000+ LOC monolith
          # exhausts both budgets reading the file before any planning /
          # generation work happens — the migration silently truncates.
          # 200 KB byte cap is the secondary safety: a single line that
          # happens to be 100 KB still blows the context budget even
          # though LOC stays tiny.
          BYTES=$TOTAL_BYTES
          LOC=$TOTAL_LOC
          if [ "$BYTES" -ge 200000 ] || [ "$LOC" -ge 5000 ]; then
            MSG="::error::Input file ${INPUT_PATH} is too large (${LOC} LOC, ${BYTES} bytes). Pipeline cap: 5000 LOC / 200 KB. Split into multiple files before migrating."
            echo "$MSG"
            {
              echo "## Stage 0 input pre-flight — FAILED"
              echo ""
              echo "**Reason:** \`${INPUT_PATH}\` exceeds the pipeline size cap (${LOC} LOC, ${BYTES} bytes; cap 5000 LOC / 200 KB)."
              echo ""
              echo "Split the suite by feature group, then re-trigger Stage 1 per group."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Check 4 — Encoding (UTF-8 / ASCII only).
          # WHY: Selenium Java files pasted from Windows tooling can be
          # Windows-1252 or carry a UTF-8 BOM. bash grep's behavior on
          # mixed-encoding bytes is undefined, and Claude's tokenizer
          # mangles non-UTF8 sequences into byte-level noise that wrecks
          # locator extraction. We refuse and tell the user how to fix
          # it (iconv) rather than producing a corrupted plan.
          if [ -n "$BAD_ENC" ]; then
            ENC=$(echo "$BAD_ENC" | awk '{print $1}' | awk -F= '{print $2}')
            MSG="::error::Input file ${INPUT_PATH} has unsupported encoding '${ENC}'. Convert to UTF-8 before migrating (iconv -f windows-1252 -t utf-8 ...)."
            echo "$MSG"
            {
              echo "## Stage 0 input pre-flight — FAILED"
              echo ""
              echo "**Reason:** \`${INPUT_PATH}\` is encoded as \`${ENC}\` — pipeline accepts only \`utf-8\` or \`us-ascii\`."
              echo ""
              echo "Fix: \`iconv -f windows-1252 -t utf-8 <file> > <file>.utf8 && mv <file>.utf8 <file>\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Check 5 — Content sanity (at least one test declaration).
          # WHY: catches the case where someone points the pipeline at a
          # config file, a README, or a helper-only file that has no
          # actual test cases. Without this gate Claude would dutifully
          # produce a "plan" describing how to migrate fixtures or
          # imports — useless output that costs a full Claude run.
          # Markers cover the four supported source frameworks:
          #   test(   — Playwright TS, Jest
          #   it(     — Mocha, Cypress, Jasmine
          #   def test_ — pytest (Selenium Python)
          #   @Test   — JUnit (Selenium Java)
          if [ "$TEST_COUNT" -eq 0 ]; then
            MSG="::error::Input file ${INPUT_PATH} contains no recognizable test declaration (test(/it(/def test_/@Test). Is this actually a test file?"
            echo "$MSG"
            {
              echo "## Stage 0 input pre-flight — FAILED"
              echo ""
              echo "**Reason:** \`${INPUT_PATH}\` contains no \`test(\`, \`it(\`, \`def test_\`, or \`@Test\` markers — does not look like a test file."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # Success — single-line summary the reviewer can scan in the
          # job log without scrolling. PRIMARY_ENC reports the dominant
          # encoding (utf-8 unless every file was pure ASCII, in which
          # case it stays utf-8 by default since us-ascii is a UTF-8
          # subset and downstream consumers treat it identically).
          echo "Pre-flight OK: ${LOC} LOC, ${PRIMARY_ENC} encoding, ${TEST_COUNT} test declarations"
          {
            echo "## Stage 0 input pre-flight — OK"
            echo ""
            echo "- Input: \`${INPUT_PATH}\` (${#FILES[@]} file(s))"
            echo "- Size: ${LOC} LOC / ${BYTES} bytes (cap 5000 LOC / 200 KB)"
            echo "- Encoding: ${PRIMARY_ENC}"
            echo "- Test declarations detected: ${TEST_COUNT}"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.dedup.outputs.skip == 'false'
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install project deps (envelope validator needs ts-morph + ajv)
        if: steps.dedup.outputs.skip == 'false'
        run: npm ci

      - name: Install Claude Code CLI
        if: steps.dedup.outputs.skip == 'false'
        run: npm install -g @anthropic-ai/claude-code

      - name: Debug — verify token presence (length only, never value)
        if: steps.dedup.outputs.skip == 'false'
        env:
          T: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${T:-}" ]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is EMPTY in this workflow"
            exit 1
          fi
          LEN=$(printf '%s' "$T" | wc -c)
          # Trim whitespace + check that.
          TRIMMED=$(printf '%s' "$T" | tr -d ' \t\n\r')
          TLEN=$(printf '%s' "$TRIMMED" | wc -c)
          echo "Raw token length: $LEN"
          echo "Trimmed length: $TLEN"
          if [ "$LEN" -ne "$TLEN" ]; then
            echo "::warning::Token contains whitespace/newline characters — likely paste issue"
          fi
          # Print first 12 chars to distinguish sk-ant-api03- vs sk-ant-oat01-.
          # 12 chars is non-secret prefix (format indicator only).
          echo "Token prefix (first 12 chars): ${TRIMMED:0:12}..."
          claude --version || echo "(claude --version failed)"

      - name: Stage 0.5 - RAG retrieval (Phase 1, ADR-0001)
        # Phase 1 RAG: index past plans, retrieve top-K most-similar by BM25,
        # render as markdown fragment that analyze.md includes. Gated on the
        # STAGE1_RAG repo variable so the default (off) preserves pre-Phase-1
        # behaviour. Shadow mode runs retrieval + records the json sidecar
        # for measurement but keeps the fragment empty so Sonnet does not
        # see the retrieved context - that lets us calibrate retrieval
        # quality without affecting any live plan.
        if: steps.dedup.outputs.skip == 'false'
        id: rag_retrieval
        env:
          STAGE1_RAG: ${{ vars.STAGE1_RAG || 'off' }}
          INPUT_PATH: ${{ matrix.input_path }}
          INPUT_BASENAME: ${{ steps.idempotency.outputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          MODE="${STAGE1_RAG:-off}"
          case "$MODE" in
            off|shadow|on) ;;
            *)
              echo "::error::STAGE1_RAG must be one of off|shadow|on, got '$MODE'"
              exit 1
              ;;
          esac
          # Always reset the fragment so a stale render from a previous run
          # cannot contaminate this one. Empty file = analyze.md include
          # resolves to nothing.
          : > prompts/_fragments/rag-context.md
          if [ "$MODE" = "off" ]; then
            echo "::notice::STAGE1_RAG=off - skipping retrieval (default)"
            exit 0
          fi
          # Build / refresh the index (deterministic, sha-cached cheap when
          # the corpus hasn't moved).
          npx tsx scripts/index-plans.ts > /dev/null
          mkdir -p outputs/reports
          RESULTS_PATH="outputs/reports/${INPUT_BASENAME}-rag.json"
          # Retrieval ALWAYS writes its json sidecar - shadow mode keeps
          # that file as the measurement signal even though Sonnet does
          # not see it.
          npx tsx scripts/retrieval-bm25.ts \
            --input "$INPUT_PATH" \
            --out "$RESULTS_PATH" \
            --k 3 \
            --quiet
          if [ "$MODE" = "on" ]; then
            npx tsx scripts/rag-context-render.ts \
              --results "$RESULTS_PATH" \
              --out prompts/_fragments/rag-context.md
            echo "::notice::STAGE1_RAG=on - retrieval rendered into the analyze.md prefix"
          else
            echo "::notice::STAGE1_RAG=shadow - retrieval recorded to $RESULTS_PATH, fragment kept empty"
          fi

      - name: Assemble prompt fragments
        if: steps.dedup.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # Expand {{include:_fragments/*.md}} markers in prompts/*.md into
          # prompts/_assembled/*.md. Claude reads the assembled copy so it
          # sees the resolved fragment content rather than the raw marker.
          # All 3 prompts (analyze, generate, verify) now use includes.
          npx tsx scripts/assemble-prompts.ts --write

      - name: Compute Stage 1 max-turns budget (adaptive)
        if: steps.dedup.outputs.skip == 'false'
        id: max_turns
        env:
          INPUT_PATH: ${{ matrix.input_path }}
        shell: bash
        run: |
          set -euo pipefail
          # Adaptive max-turns: count complexity markers in input and pick
          # a per-input budget from a 3-tier table. Why: Stage 1 hit 12 min
          # exit-code-1 (max-turns 12 burned) on inputs/cypress/checkout-
          # flow.cy.js twice (runs 27623863781 + 27625137636, 2026-06-16),
          # while inputs/cypress/wishlist.cy.js succeeded at max-turns=12.
          # Files are similar size; the cost difference is in *decision*
          # complexity — checkout-flow has 2 intercepts, response-body
          # assertions, dynamic .each iteration, form-input clusters.
          # Each is a known-heavy mapping (KB lookup + qa-master layering
          # decision) that costs turns. Flat bump masks the signal; this
          # adaptive table preserves the cheap path for simple inputs.
          #
          # Score = sum of:
          #   M1 — framework hooks/decorators (cy.intercept / WebElement /
          #        @Test / pytest setUp/tearDown / test_ prefix)
          #   M2 — async iteration (cy.wait('@... / .each / .forEach)
          #   M3 — form input clusters (input[name=...])
          #   M4 — DOM-up traversal & response-body assertions
          #
          # Tiers (calibrated 2026-06-16):
          #   score <= 3  → simple   → max-turns 12 (default; wishlist=3 OK)
          #   score 4-6   → medium   → max-turns 16
          #   score >= 7  → complex  → max-turns 20 (checkout-flow=13)
          if [ -d "$INPUT_PATH" ]; then
            mapfile -t FILES < <(find "$INPUT_PATH" -type f \( -name '*.ts' -o -name '*.js' -o -name '*.java' -o -name '*.py' \))
          else
            FILES=("$INPUT_PATH")
          fi
          SCORE=0
          for F in "${FILES[@]}"; do
            M1=$(grep -cE 'cy\.intercept|WebElement|@Test|def setUp|def tearDown|test_' "$F" 2>/dev/null || true)
            M2=$(grep -cE 'cy\.wait\(.@|\.each\(|\.forEach\(' "$F" 2>/dev/null || true)
            M3=$(grep -cE 'input\[name="[^"]+"\]' "$F" 2>/dev/null || true)
            M4=$(grep -cE '\.parent\(\)|interception\.response|expect.*response' "$F" 2>/dev/null || true)
            SCORE=$((SCORE + M1 + M2 + M3 + M4))
          done
          if [ "$SCORE" -le 3 ]; then
            MAX_TURNS=12
            TIER=simple
          elif [ "$SCORE" -le 6 ]; then
            MAX_TURNS=16
            TIER=medium
          else
            MAX_TURNS=20
            TIER=complex
          fi
          echo "Input complexity score: $SCORE → tier: $TIER → max-turns: $MAX_TURNS"
          echo "::notice::Adaptive Stage 1 budget: $INPUT_PATH (score $SCORE, $TIER) → --max-turns $MAX_TURNS"
          echo "max_turns=$MAX_TURNS" >> "$GITHUB_OUTPUT"

      - name: Run Claude (analyze stage)
        # Stage 1 typically finishes in 5-10 min (Read input + KB + rules +
        # examples; write plan markdown + envelope sidecar). 20 min is a 2x
        # headroom that catches a hung Sonnet call without aborting healthy
        # long-tail runs (multi-file Selenium plans push 12 min). Without
        # this cap a stuck inference would burn until GHA's 6h job limit.
        timeout-minutes: 20
        if: steps.dedup.outputs.skip == 'false'
        env:
          # Trim whitespace + auto-route by token prefix. sk-ant-api → API key
          # (ANTHROPIC_API_KEY); sk-ant-oat → OAuth token (CLAUDE_CODE_OAUTH_TOKEN).
          RAW_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_PATH: ${{ matrix.input_path }}
          OUTPUT_PATH: outputs/plans/${{ steps.idempotency.outputs.input_basename }}.md
          # `args.all` is the raw text after /regenerate (set by the
          # slash-command-dispatch action). Empty string when not a regenerate run.
          REGENERATE_FEEDBACK: ${{ github.event.client_payload.slash_command.args.all }}
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d ' \t\n\r')
          PREFIX="${TOKEN:0:12}"
          echo "Detected token prefix: ${PREFIX}..."
          case "$PREFIX" in
            sk-ant-oat*) export CLAUDE_CODE_OAUTH_TOKEN="$TOKEN" ; echo "Routing as OAuth token" ;;
            sk-ant-api*) export ANTHROPIC_API_KEY="$TOKEN" ; echo "Routing as API key" ;;
            *) echo "::warning::Unknown token prefix '$PREFIX' — defaulting to ANTHROPIC_API_KEY" ; export ANTHROPIC_API_KEY="$TOKEN" ;;
          esac
          # Conditionally build the feedback block. Done in shell (not heredoc)
          # so we don't inject an empty section header when there's no feedback.
          FEEDBACK_BLOCK=""
          if [ -n "${REGENERATE_FEEDBACK:-}" ]; then
            FEEDBACK_BLOCK=$(printf '\n## Reviewer feedback for regeneration\n\nA previous plan PR for this input was closed by a reviewer who left this feedback. Address it directly in the new plan — what they flagged is what they want fixed.\n\n%s\n' "$REGENERATE_FEEDBACK")
            echo "Regeneration with reviewer feedback (${#REGENERATE_FEEDBACK} chars)."
          fi
          # Build the prompt and invoke claude CLI in print (non-interactive)
          # mode. Claude reads context files via its own Read tool and writes
          # the deliverable via its Write tool. Output goes to OUTPUT_PATH.
          PROMPT=$(cat <<EOF
          You are running Stage 1 of the PWmodernizer pipeline.

          ## Your task

          Read prompts/_assembled/analyze.md — that's your full system prompt and task
          description. Follow it exactly.

          ## Input for this run

          - Input path: $INPUT_PATH (may be a single file OR a directory containing multiple source files, helpers, page objects, fixtures)
          - Output plan path to write: $OUTPUT_PATH

          If $INPUT_PATH is a directory: read EVERY source file in it (.ts/.js/.java/.py) and reason about the test suite as a whole. The plan describes migrating the entire unit.
          If $INPUT_PATH is a single file: read just that file.

          ## Context to load (in this order)

          1. prompts/_assembled/analyze.md — your task spec (READ FIRST)
          2. config/migration-rules.md — target style + structure contract
          3. config/knowledge-base.md — anti-pattern catalog + API translations
          4. examples/reference/company-style.spec.ts — style anchor
          5. $INPUT_PATH — the input to migrate (file or directory)
          ${FEEDBACK_BLOCK}
          ## Deliverable

          ONE markdown file at $OUTPUT_PATH. NO code generation. Follow the
          plan schema in config/migration-rules.md §9 — every section must
          be present. Mark each locator translation with HIGH / MED / LOW
          confidence per prompts/_assembled/analyze.md hallucination-defense rules.
          EOF
          )
          # stream-json output: each turn emits one NDJSON event; the final
          # event carries `usage` + `model`. We pipe through `tee` so the
          # human-readable stdout is still visible in CI logs while the
          # complete event stream lands in /tmp/claude-events.ndjson for the
          # cost-tracking step that follows. tail -1 + jq extracts the final
          # event; persist-plan-metrics.ts ingests its usage.
          mkdir -p outputs/.usage
          claude \
            --model claude-sonnet-4-6 \
            --max-turns ${{ steps.max_turns.outputs.max_turns }} \
            --print \
            --output-format stream-json \
            --verbose \
            --permission-mode acceptEdits \
            "$PROMPT" \
            > /tmp/claude-events.ndjson
          # NB: direct `>` redirect, NOT `| tee`. Sonnet + stream-json with
          # verbose output can SIGPIPE the LLM if the terminal can't keep
          # up. Direct redirect is the stable pattern for stream-json
          # capture. Same fix as migrate.yml + verify.yml.

      - name: Diagnose Claude crash (on failure)
        if: failure() && steps.dedup.outputs.skip == 'false'
        shell: bash
        run: |
          # When Claude exits non-zero (transient Anthropic outage, OAuth
          # 401, max-turns, SIGPIPE) the workflow log only shows the bash
          # command echo'd and then "exit code 1" — stdout went to the
          # ndjson file and stderr is mostly silent for Claude CLI. This
          # step dumps ndjson size + last 5 events + final event type so
          # the failure mode is attributable in one pass.
          # See verify.yml for the same pattern + PR #126 motivation.
          EVENTS=/tmp/claude-events.ndjson
          echo "::group::Stage 1 (plan) crash diagnostics"
          if [ ! -e "$EVENTS" ]; then
            echo "ndjson file does not exist — Claude CLI never wrote stdout"
          elif [ ! -s "$EVENTS" ]; then
            echo "ndjson file exists but is empty — Claude exited before first event"
          else
            echo "ndjson: $(wc -c < "$EVENTS" | tr -d ' ') bytes, $(wc -l < "$EVENTS" | tr -d ' ') events"
            echo "--- LAST 5 EVENTS ---"
            tail -5 "$EVENTS" || true
            echo "--- FINAL EVENT TYPE ---"
            tail -1 "$EVENTS" | jq -r '.type // "unknown"' 2>/dev/null || echo "could not parse final event as JSON"
          fi
          echo "::endgroup::"

      - name: Capture Claude usage stats (cost tracking)
        if: steps.dedup.outputs.skip == 'false'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ steps.idempotency.outputs.input_basename }}"
          if [ ! -s /tmp/claude-events.ndjson ]; then
            echo "::warning::No claude events captured — skipping usage extract"
            exit 0
          fi
          # Find the last NDJSON line that carries a `usage` object. The CLI
          # emits status events first; the result event (last) has usage+model.
          FINAL=$(grep -E '"usage"' /tmp/claude-events.ndjson | tail -1 || true)
          if [ -z "$FINAL" ]; then
            echo "::warning::No event with usage object — skipping"
            exit 0
          fi
          echo "$FINAL" > /tmp/claude-result.json
          npx tsx scripts/extract-claude-usage.ts \
            --from /tmp/claude-result.json \
            --out "outputs/.usage/${BASE}.json" \
            --tolerant

      - name: Validate plan structure
        if: steps.dedup.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          PLAN="outputs/plans/${{ steps.idempotency.outputs.input_basename }}.md"
          if [ ! -f "$PLAN" ]; then
            echo "::error::Plan file $PLAN was not produced"
            exit 1
          fi
          # Hallucination-defense pins demoted to ENCOURAGED per Tam et al. 2024
          # (forced schema sections degrade reasoning quality). Not in gate.
          for section in \
            "## Source framework" \
            "## Summary" \
            "## Anti-patterns detected" \
            "## Locator translation table" \
            "## Structural changes" \
            "## Open questions for reviewer" \
            "## Risk callouts" \
            "## Expected metrics" \
          ; do
            if ! grep -qF "$section" "$PLAN"; then
              echo "::error::Plan missing required section: $section"
              exit 1
            fi
          done
          if ! grep -qiE 'high|med|low' "$PLAN"; then
            echo "::error::Plan has no confidence markers (HIGH/MED/LOW)"
            exit 1
          fi
          echo "Plan validated."

      - name: Validate plan DOM grounding
        if: steps.dedup.outputs.skip == 'false'
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          # Phase 6 DOM grounding (per docs/playwright-mcp-integration.md §3.1):
          # when an accessibility snapshot exists for this input at
          # outputs/dom-snapshots/<basename>.yaml, every locator pin in the
          # plan markdown must be annotated with `// dom-snapshot:role=...|name=...`
          # AND the cited role/name must be present in the snapshot. When no
          # snapshot exists (current default for offline migrations), the
          # validator exits 0 silently. Soft mode — `continue-on-error: true`
          # surfaces hallucination candidates as warnings without blocking the
          # plan PR until Phase 6 calibration is complete. Promote to hard mode
          # after sufficient SUT calibration coverage (parallels DOM_GROUND_STRICT
          # promotion path for the Stage 2 validator).
          BASE="${{ steps.idempotency.outputs.input_basename }}"
          PLAN="outputs/plans/${BASE}.md"
          SNAPSHOT="outputs/dom-snapshots/${BASE}.yaml"
          if [ ! -f "$SNAPSHOT" ]; then
            echo "validate-plan-dom-grounding: no snapshot at $SNAPSHOT — skipping (offline migration mode)."
            exit 0
          fi
          npx tsx scripts/validate-plan-dom-grounding.ts --plan "$PLAN" --snapshot "$SNAPSHOT" || \
            echo "::warning::Plan DOM grounding has unresolved pins — see ::error:: annotations above. Soft mode: not failing the workflow."

      - name: Validate plan envelope JSON (LPW/Routine contract — Stage 1 dual-output mandate)
        if: steps.dedup.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          # Stage 1 MUST emit BOTH outputs/plans/<basename>.md AND
          # outputs/plans/<basename>.envelope.json per ROADMAP v1.0
          # "Plan envelope enforcement". prompts/_assembled/analyze.md
          # spells out the dual-deliverable contract; this step gates it.
          BASE="${{ steps.idempotency.outputs.input_basename }}"
          PLAN="outputs/plans/${BASE}.md"
          ENV="outputs/plans/${BASE}.envelope.json"
          # Safety net (commits a3a6cc5 + 1d775c3 + 31a2bfa): if Claude did
          # not emit the envelope JSON alongside the markdown, derive it
          # from the markdown plan so Stage 2 always has a machine-readable
          # contract. derive-envelope is owned by the metrics agent — do
          # NOT loosen plan-envelope-validate.ts to compensate.
          if [ ! -f "$ENV" ]; then
            echo "::warning::Stage 1 envelope $ENV missing — Claude did not emit the JSON sidecar. Deriving from markdown plan as safety net (analyze.md mandates dual output)."
            npx tsx scripts/derive-envelope.ts --plan "$PLAN" --out "$ENV"
          else
            echo "Stage 1 envelope present at $ENV (dual-output contract satisfied)."
          fi
          # Strict schema validation via the canonical validator. Same
          # call as `npm run check:envelope`; fail-fast on any divergence.
          npx tsx scripts/plan-envelope-validate.ts --envelope "$ENV"

      - name: Compute severity histogram
        id: histogram
        if: steps.dedup.outputs.skip == 'false'
        shell: bash
        run: |
          set -euo pipefail
          PLAN="outputs/plans/${{ steps.idempotency.outputs.input_basename }}.md"
          # Count anti-pattern severity rows: | H | / | M | / | L | (case sensitive after table format mandate)
          H=$(grep -cE '^\| H \|' "$PLAN" || true)
          M=$(grep -cE '^\| M \|' "$PLAN" || true)
          L=$(grep -cE '^\| L \|' "$PLAN" || true)
          TOTAL=$((H + M + L))
          echo "h=$H" >> "$GITHUB_OUTPUT"
          echo "m=$M" >> "$GITHUB_OUTPUT"
          echo "l=$L" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Histogram: $TOTAL anti-patterns ($H high, $M medium, $L low)"

      - name: Persist plan metrics
        if: steps.dedup.outputs.skip == 'false'
        env:
          METRICS_DB: outputs/.metrics.db
          GITHUB_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          # v1 ROADMAP "Metrics dashboard" — write Stage 1 row to local SQLite.
          # Wrapped in `|| ::warning::` so DB write failures cannot fail Stage 1;
          # the metrics DB is a reporting cache, not a system of record
          # (see scripts/metrics.ts module docstring).
          BASE="${{ steps.idempotency.outputs.input_basename }}"
          ENV="outputs/plans/${BASE}.envelope.json"
          if [ ! -f "$ENV" ]; then
            echo "::warning::persist-plan-metrics: envelope $ENV missing — skipping metrics write"
            exit 0
          fi
          USAGE_FILE="outputs/.usage/${BASE}.json"
          USAGE_ARG=""
          [ -f "$USAGE_FILE" ] && USAGE_ARG="--usage $USAGE_FILE"
          # Phase 1 RAG telemetry (ADR-0001). When STAGE1_RAG is anything
          # other than empty/off the Stage 0.5 step wrote a sidecar JSON to
          # outputs/reports/<base>-rag.json. Pass both the mode + the sidecar
          # so persist-plan-metrics writes rag_mode + rag_retrieved_ids +
          # rag_top_score onto the plans row.
          RAG_MODE="${{ vars.STAGE1_RAG || 'off' }}"
          RAG_REPORT="outputs/reports/${BASE}-rag.json"
          RAG_ARGS="--rag-mode $RAG_MODE"
          if [ -f "$RAG_REPORT" ]; then
            RAG_ARGS="$RAG_ARGS --rag-report $RAG_REPORT"
          fi
          # shellcheck disable=SC2086 # *_ARG intentionally word-split
          npx tsx scripts/persist-plan-metrics.ts --envelope "$ENV" $USAGE_ARG $RAG_ARGS || \
            echo "::warning::persist-plan-metrics failed (non-fatal)"

      - name: Open plan PR
        if: steps.dedup.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          branch: migrator/plan-${{ steps.idempotency.outputs.input_basename }}
          base: main
          commit-message: 'chore(plan): migration plan for ${{ matrix.input_path }}'
          title: '[Migration plan] ${{ matrix.input_path }}'
          labels: |
            migrator:plan
            ${{ steps.idempotency.outputs.label }}
          body: |
            ## Stage 1 — Migration plan

            **Input:** `${{ matrix.input_path }}`
            **Plan:** `outputs/plans/${{ steps.idempotency.outputs.input_basename }}.md`
            **Severity histogram:** ${{ steps.histogram.outputs.total }} anti-patterns — **${{ steps.histogram.outputs.h }} H** / ${{ steps.histogram.outputs.m }} M / ${{ steps.histogram.outputs.l }} L
            **To regenerate:** comment `/regenerate <optional feedback>` on this PR

            ### Review checklist

            - [ ] Source framework detected correctly?
            - [ ] All anti-patterns listed match what you'd flag manually?
            - [ ] Locator confidence column — are LOW/MED rows actually risky?
            - [ ] Structural changes match file complexity?
            - [ ] Open questions answered (edit the plan if needed)?

            ### What happens on merge

            Merging triggers Stage 2 (`migrate.yml`) which reads this plan
            and emits the Playwright TypeScript. **If the plan is wrong,
            edit it BEFORE merge** — Stage 2 follows the plan literally.

            ### Caveats

            - Stage 1 is LLM-generated; it may miss subtle intent.
            - LOW-confidence locators are guesses; verify against real DOM.
