# Regression test — protects pipeline contracts from prompt/config drift.
#
# Trigger: PRs touching prompts/, config/, scripts/, examples/, or workflow YAMLs.
# Does NOT run real Claude (expensive). Instead validates structural contracts:
#   - All examples have input + expected-output + expected-plan files
#   - KB IDs are unique across knowledge-base.md
#   - migration-rules.md has all sections referenced from prompts
#   - prompts/ files exist and are non-empty
#   - scripts/ pass tsc strict mode
#
# Semantic regression (does Claude still produce equivalent output?) is too
# expensive for per-PR CI. Run `gh workflow run regression-semantic.yml` manually
# before tagging a release (TODO: v0.5 scope).
#
# Parallelization (2026-06-04): originally 13 sequential steps in one job, ~5 min.
# Refactored to fan out the independent gates across a matrix so they run in
# parallel. Setup job pre-warms a shared actions/cache so each matrix worker
# restores node_modules in ~5s instead of re-running `npm ci` (~30s).

name: Regression — structural contracts

on:
  pull_request:
    paths:
      - 'prompts/**'
      - 'config/**'
      - 'scripts/**'
      - 'tools/**'                    # calibration fixtures + run-calibration.ts
      - 'examples/**'
      - '.github/workflows/**'
      - 'tsconfig.json'
      - 'outputs/tests/tsconfig.json'
      - 'outputs/plans/*.envelope.json' # real Stage 1 envelopes that should validate
      - 'package.json'                # npm script changes (smoke, validate:all, etc.)

permissions:
  contents: read

jobs:
  # Pre-warm the npm cache so every matrix worker in `checks` restores
  # node_modules from cache instead of re-running `npm ci`. We don't run any
  # gates here — just populate the cache. Total cost ≈ 30s, paid once.
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Cache npm + node_modules
        id: cache-npm
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-

      - name: Install deps (only on cache miss)
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

  # Fan out the gates across a matrix. Each entry checks out, restores the
  # node_modules cache primed by `setup`, and runs its slice of the gates.
  # All original 13 gates are mapped to one of these 10 matrix entries;
  # see `name` on each include below for the mapping.
  checks:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - check: examples-contract
            name: Examples contract check
          - check: kb-ids
            name: KB unique IDs + KB validate
          - check: validate-examples
            name: Validate examples (strict)
          - check: prompts-and-fragments
            name: Prompts non-empty + fragments resolve
          - check: migration-rules-schema
            name: migration-rules schema sections
          - check: typecheck
            name: Scripts + outputs tsc strict
          - check: envelope-and-derive
            name: Plan envelope + derive roundtrip + outputs/plans validate
          - check: calibrate
            name: Validators calibrated (Sakasegawa 2026)
          - check: verify-verdict-ladder
            name: Verify verdict ladder consistency
          - check: regenerate-dispatch
            name: Regenerate-dispatch flow wired end-to-end
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Restore npm + node_modules cache
        id: cache-restore
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node22-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node22-

      - name: Install deps (fallback if cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: npm ci

      # ----- Original gate 1 -----
      - name: Examples contract check
        if: matrix.check == 'examples-contract'
        shell: bash
        run: |
          set -euo pipefail
          # Every examples/<framework>-<n>/ dir MUST contain input, expected-output, expected-plan.
          MISSING=0
          for dir in examples/*/; do
            if [[ "$dir" == "examples/reference/" ]]; then continue; fi
            BASENAME=$(basename "$dir")
            # input: either a single input.* file OR an input/ directory
            # (multi-file examples like selenium-*-03-multifile-login).
            if ! ls "$dir"input.* >/dev/null 2>&1 && [ ! -d "$dir"input ]; then
              echo "::error file=$dir::missing input.* file or input/ directory"
              MISSING=$((MISSING + 1))
            fi
            # expected-output: same shape (single file OR directory).
            if ! ls "$dir"expected-output.* >/dev/null 2>&1 && [ ! -d "$dir"expected-output ]; then
              echo "::error file=$dir::missing expected-output.* file or expected-output/ directory"
              MISSING=$((MISSING + 1))
            fi
            if [ ! -f "$dir"expected-plan.md ]; then
              echo "::error file=$dir::missing expected-plan.md"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING example contract violations"
            exit 1
          fi
          echo "All examples have contract-complete file sets."

      # ----- Original gates 2 + 3 (KB ID checks share state) -----
      - name: KB unique IDs check
        if: matrix.check == 'kb-ids'
        shell: bash
        run: |
          set -euo pipefail
          # Anti-pattern IDs are KB-N.N.N format. No duplicates allowed.
          DUPES=$(grep -oE 'KB-[0-9]+\.[0-9]+\.[0-9]+' config/knowledge-base.md \
            | sort | uniq -d || true)
          if [ -n "$DUPES" ]; then
            echo "::error::Duplicate KB IDs detected in config/knowledge-base.md:"
            echo "$DUPES"
            exit 1
          fi
          COUNT=$(grep -cE 'KB-[0-9]+\.[0-9]+\.[0-9]+' config/knowledge-base.md || true)
          echo "KB has $COUNT unique IDs."

      - name: KB IDs valid + referenced
        if: matrix.check == 'kb-ids'
        shell: bash
        run: |
          set -euo pipefail
          # Strict validator: covers OLD KB-N.N.N and NEW <fw>/<topic>/<name>
          # formats during the kb-id-migration transition (see config/kb-id-migration.md).
          # Catches duplicates, malformed new-format IDs, and dangling references
          # from prompts/*.md or config/migration-rules.md.
          npx tsx scripts/kb-validate.ts

      # ----- Original gate 4 -----
      - name: Examples KB/Q-ID cross-references valid
        if: matrix.check == 'validate-examples'
        shell: bash
        run: |
          set -euo pipefail
          # Cross-validates every examples/*/expected-plan.md fixture against the
          # KB and its own Open-questions section. Catches Cleanlab-style noisy
          # few-shot rot: a pin citing Q-greeting / KB-1.1.99 silently teaches
          # Stage 1 to hallucinate the same dangling reference.
          # PROMOTED to --strict 2026-06-04: calibration fixtures (3+3) are
          # green (tools/calibrate-pipeline/), validator is trustworthy enough
          # to block on real findings. Corpus baseline: 12 plans, 0 findings.
          npx tsx scripts/validate-examples.ts --strict

      # ----- Original gates 5 + 6 -----
      - name: Prompt files non-empty
        if: matrix.check == 'prompts-and-fragments'
        shell: bash
        run: |
          set -euo pipefail
          for f in prompts/analyze.md prompts/generate.md prompts/verify.md; do
            if [ ! -s "$f" ]; then
              echo "::error file=$f::prompt file missing or empty"
              exit 1
            fi
          done
          echo "Prompts present + non-empty."

      - name: Prompts fragments resolve
        if: matrix.check == 'prompts-and-fragments'
        shell: bash
        run: |
          set -euo pipefail
          # BAML-inspired {{include:_fragments/<name>.md}} markers must all resolve;
          # no orphan markers; no circular references. Run in --check (read-only)
          # mode so this is safe on PRs. The --write mode (npm run
          # assemble-prompts) is a planned v0.5 hook for plan.yml / migrate.yml.
          npx tsx scripts/assemble-prompts.ts --check

      # ----- Original gate 7 -----
      - name: migration-rules schema sections
        if: matrix.check == 'migration-rules-schema'
        shell: bash
        run: |
          set -euo pipefail
          # Plan validation step in plan.yml requires these sections. If migration-rules
          # drops one, plan.yml validation breaks silently — gate it here.
          # Hallucination-defense pins demoted to ENCOURAGED per Tam et al. 2024
          # (forced schema sections degrade reasoning quality).
          REQUIRED_SECTIONS=(
            "## Source framework"
            "## Summary"
            "## Anti-patterns detected"
            "## Locator translation table"
            "## Structural changes"
            "## Open questions for reviewer"
            "## Risk callouts"
            "## Expected metrics"
          )
          for section in "${REQUIRED_SECTIONS[@]}"; do
            if ! grep -qF "$section" config/migration-rules.md; then
              echo "::error::config/migration-rules.md missing schema section referenced by plan.yml: $section"
              exit 1
            fi
          done
          echo "migration-rules schema sections complete."

      # ----- Original gate 8 -----
      - name: Scripts + outputs compile under strict TS
        if: matrix.check == 'typecheck'
        shell: bash
        run: |
          set -euo pipefail
          # Root tsconfig covers scripts/ and tools/.
          npx tsc --noEmit -p tsconfig.json
          # outputs/tests/ tsconfig covers playwright.config.ts + any
          # migration-output specs / pages / fixtures present.
          npx tsc --noEmit -p outputs/tests/tsconfig.json

      # ----- Original gate 9 -----
      - name: Validators calibrated against fixtures (Sakasegawa 2026)
        if: matrix.check == 'calibrate'
        shell: bash
        run: |
          set -euo pipefail
          # tools/calibrate-pipeline/ runs each validator against 3 good + 3 bad
          # fixtures per validator. Validator must accept goods and reject bads
          # with the expected error message (golden-output substring match).
          # Required before any validator is promoted from --warn to --strict.
          npm run calibrate

      # ----- Original gates 10 + 11 (envelope canonical + outputs/plans + derive roundtrip) -----
      - name: Plan envelope schema validates
        if: matrix.check == 'envelope-and-derive'
        shell: bash
        run: |
          set -euo pipefail
          # Keeps scripts/plan-envelope.schema.json and the canonical example
          # envelope in sync. Wired into plan.yml / migrate.yml since commit
          # a3a6cc5; derive-envelope.ts (31a2bfa) is the safety net so envelope
          # always exists. See scripts/plan-envelope-validate.ts header for the
          # LPW (arXiv 2411.14503) / Routine (arXiv 2507.14447) background.
          npx tsx scripts/plan-envelope-validate.ts --envelope examples/bad-playwright-01-flaky-waits/expected-plan.envelope.json
          # Also validate every envelope that exists under outputs/plans/ —
          # catches real Stage 1 emissions that drift from the schema.
          shopt -s nullglob
          for env in outputs/plans/*.envelope.json; do
            echo "Validating $env"
            npx tsx scripts/plan-envelope-validate.ts --envelope "$env"
          done

      - name: Derive envelope works on every example plan
        if: matrix.check == 'envelope-and-derive'
        shell: bash
        run: |
          set -euo pipefail
          # Catches regressions in derive-envelope.ts that would break the
          # plan.yml/migrate.yml fallback. Every plan in examples/ must
          # derive to a schema-valid envelope. Skips examples/reference/.
          TMPDIR=$(mktemp -d)
          FAILED=0
          for plan in examples/*/expected-plan.md; do
            base=$(basename "$(dirname "$plan")")
            if [ "$base" = "reference" ]; then continue; fi
            ENV="$TMPDIR/${base}.envelope.json"
            if ! npx tsx scripts/derive-envelope.ts --plan "$plan" --out "$ENV" >/dev/null 2>&1; then
              echo "::error file=$plan::derive-envelope failed"
              FAILED=$((FAILED + 1))
              continue
            fi
            if ! npx tsx scripts/plan-envelope-validate.ts --envelope "$ENV" >/dev/null 2>&1; then
              echo "::error file=$plan::derived envelope failed schema validation"
              FAILED=$((FAILED + 1))
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED example plans failed derive→validate roundtrip"
            exit 1
          fi
          echo "All examples derive to valid envelopes."

      # ----- Original gate 12 -----
      - name: Verify verdict ladder consistency
        if: matrix.check == 'verify-verdict-ladder'
        shell: bash
        run: |
          set -euo pipefail
          # prompts/verify.md and verify.yml MUST share the same 3-level verdict ladder.
          for v in "SHIP IT" "FIX FIRST" "START OVER"; do
            if ! grep -qF "$v" prompts/verify.md; then
              echo "::error::prompts/verify.md missing verdict level: $v"
              exit 1
            fi
            if ! grep -qF "$v" .github/workflows/verify.yml; then
              echo "::error::.github/workflows/verify.yml missing verdict level: $v"
              exit 1
            fi
          done
          echo "Verdict ladder consistent across prompt and workflow."

      # ----- Original gate 13 -----
      - name: Regenerate-dispatch flow wired end-to-end
        if: matrix.check == 'regenerate-dispatch'
        shell: bash
        run: |
          set -euo pipefail
          # End-to-end /regenerate wiring check:
          #   1. regenerate-dispatch.yml exists
          #   2. references peter-evans/slash-command-dispatch
          #   3. emits event-type "regenerate-plan" (suffix "-plan" + command "regenerate")
          #   4. plan.yml listens for repository_dispatch type "regenerate-plan"
          # Any drift between these breaks the abandon-and-regenerate flow silently
          # (reviewer types /regenerate, nothing happens).
          FILE=".github/workflows/regenerate-dispatch.yml"
          if [ ! -f "$FILE" ]; then
            echo "::error::$FILE missing — /regenerate flow is broken."
            exit 1
          fi
          if ! grep -qF 'peter-evans/slash-command-dispatch' "$FILE"; then
            echo "::error file=$FILE::does not reference peter-evans/slash-command-dispatch"
            exit 1
          fi
          if ! grep -qF 'event-type-suffix: -plan' "$FILE"; then
            echo "::error file=$FILE::missing 'event-type-suffix: -plan' (needed to construct 'regenerate-plan' event)"
            exit 1
          fi
          if ! grep -qF 'commands: regenerate' "$FILE"; then
            echo "::error file=$FILE::missing 'commands: regenerate'"
            exit 1
          fi
          if ! grep -qF 'types: [regenerate-plan]' .github/workflows/plan.yml; then
            echo "::error file=.github/workflows/plan.yml::missing 'types: [regenerate-plan]' repository_dispatch listener — /regenerate fires but plan.yml does nothing"
            exit 1
          fi
          echo "Regenerate-dispatch flow wired end-to-end."
