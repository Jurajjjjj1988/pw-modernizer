# Verify — CANDOR 2-agent consensus check.
#
# Only triggered when migrate.yml emits an aggregate confidence < 0.7. We
# invoke TWO Opus calls IN PARALLEL — an SDET lens and a Code Review lens —
# each reading its own prompt and writing its own verdict report. A downstream
# tally job aggregates the two verdicts via the consensus ladder.
#
# Why split: CANDOR (arxiv:2506.02943) shows multi-model consensus filters
# hallucinations more reliably than prompt engineering. Splitting one model
# into two role-prompted *instances* approximates that benefit at lower cost
# than running two distinct models: independent lenses (different mental
# checklists) produce diverging false positives, which the tally rounds out.
# Pattern reference: ai-debug-accelerator/debugger.py uses the same
# independent-evaluator + conservative-tally shape.
#
# Verdict ladder (tally):
#   2/2 SHIP IT  → SHIP IT
#   1/2 SHIP IT  → FIX FIRST (the other lens flagged something concrete)
#   0/2 SHIP IT  → START OVER (worst of the two if both rejected)
#
# Preserved from single-Opus design:
#   - Output secret scan (now mirrored over both sub-reports + the combined)
#   - persist-verify-metrics.ts row (reads the combined report's verdict)
#   - confidence:high override on final SHIP IT (Opus pair overrides Sonnet
#     confidence:low alarm)
#   - Auto-regen on final START OVER (repository_dispatch with feedback +
#     regen-attempt counter, cap 3)
#   - Explicit guard when either sub-agent fails to produce a report

name: Verify — CANDOR 2-agent consensus

on:
  workflow_dispatch:
    inputs:
      input_basename:
        description: 'Basename of the input file to verify'
        required: true
        type: string
      generate_confidence:
        description: 'Aggregate confidence reported by Stage 2'
        required: true
        type: string
      pr_branch:
        description: 'Optional branch ref to checkout (defaults to main). Use migrator/code-<name> to verify an unmerged Stage 2 PR.'
        required: false
        type: string
        default: 'main'
      verify_attempt:
        description: 'Retry counter for transient START OVER (parser bugs, hallucinations). Cap at 2 — beyond that the verdict is real.'
        required: false
        type: string
        default: '1'

permissions:
  # contents:write — needed by `gh api repos/.../dispatches` in the
  # Auto-regen branch (see "Comment verify findings" step). GitHub's
  # POST /repos/{owner}/{repo}/dispatches endpoint requires write access
  # to repository contents for the github.token to fire it.
  # NB: repository_dispatch fired with github.token DOES re-trigger
  # downstream `repository_dispatch` listeners (this is documented
  # behavior — `push` listeners are the special case that DOESN'T fire).
  contents: write
  pull-requests: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Two parallel sub-agents. Matrix strategy keeps the two definitions DRY —
  # only `lens` differs. fail-fast: false because we want BOTH verdicts even
  # if one sub-agent errors (the tally step needs to see the failure shape).
  # ---------------------------------------------------------------------------
  verify-subagent:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lens: [sdet, code-review]
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          # Default 'main' preserves the post-merge-audit design that
          # migrate.yml → trigger-verify relies on. Override via the
          # workflow_dispatch `pr_branch` input when verifying an unmerged
          # Stage 2 PR (e.g. `migrator/code-<name>`); the spec + report
          # live on that branch until human review merges them.
          ref: ${{ inputs.pr_branch || 'main' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install project deps + assemble prompt fragments
        run: |
          npm ci
          npx tsx scripts/assemble-prompts.ts --write

      - name: Run Claude (verify stage, Opus, ${{ matrix.lens }} lens)
        env:
          # Trim whitespace + auto-route by token prefix. sk-ant-api → API key
          # (ANTHROPIC_API_KEY); sk-ant-oat → OAuth token (CLAUDE_CODE_OAUTH_TOKEN).
          RAW_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          INPUT_BASENAME: ${{ inputs.input_basename }}
          LENS: ${{ matrix.lens }}
        run: |
          set -euo pipefail
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d ' \t\n\r')
          PREFIX="${TOKEN:0:12}"
          case "$PREFIX" in
            sk-ant-oat*) export CLAUDE_CODE_OAUTH_TOKEN="$TOKEN" ;;
            sk-ant-api*) export ANTHROPIC_API_KEY="$TOKEN" ;;
            *) echo "::warning::Unknown token prefix '$PREFIX'" ; export ANTHROPIC_API_KEY="$TOKEN" ;;
          esac
          # Human-readable name for the lens (only used inside the prompt
          # boilerplate; the prompt files themselves declare their role).
          case "$LENS" in
            sdet)        LENS_LABEL="Senior SDET" ;;
            code-review) LENS_LABEL="Code Reviewer" ;;
            *) echo "::error::Unknown lens '$LENS'" ; exit 1 ;;
          esac
          PROMPT_FILE="prompts/_assembled/verify-${LENS}.md"
          REPORT_PATH="outputs/reports/${INPUT_BASENAME}-verify-${LENS}.md"
          PROMPT=$(cat <<EOF
          You are running the Verify stage of the PWmodernizer pipeline as
          the ${LENS_LABEL} sub-agent in a CANDOR 2-agent consensus check.

          A second sub-agent (the other lens) is running in PARALLEL on the
          same migration and is BLIND to your output. Do not coordinate. Do
          not duplicate the other lens's work. Stay in your lane.

          ## Your task

          Read ${PROMPT_FILE} — that's your full system prompt. Follow it
          exactly. Be picky on the items your lens owns; defer on the items
          marked "[other-lens owns — skip]".

          ## Input for this run

          - Approved plan: outputs/plans/${INPUT_BASENAME}.md
          - Sonnet's output: outputs/tests/${INPUT_BASENAME}
          - Sonnet's report: outputs/reports/${INPUT_BASENAME}.md
          - Your verify report path: ${REPORT_PATH}

          ## Context to load

          1. ${PROMPT_FILE} — your task spec (READ FIRST)
          2. config/migration-rules.md — what "good" looks like
          3. outputs/plans/${INPUT_BASENAME}.md
          4. outputs/tests/${INPUT_BASENAME}
          5. outputs/reports/${INPUT_BASENAME}.md

          ## Deliverable

          ONE markdown file at ${REPORT_PATH}. Schema in ${PROMPT_FILE}.
          Verdict line MUST be EXACTLY one of (case-sensitive):
          - Verdict: SHIP IT
          - Verdict: FIX FIRST
          - Verdict: START OVER
          EOF
          )
          # 25 turns: SDET + Code Review each need to Read 3-5 files
          # (plan, generated spec, POMs, report) + Write 1 verdict.md.
          # 12 was too tight — real-world Java migrations hit limit consistently.
          # See plan.yml for stream-json + tee + extract-claude-usage flow.
          # Verify runs Opus 4.7 which is ~5× sonnet cost — cost tracking
          # especially matters here. Each lens (sdet, code-review) writes
          # its own usage file.
          mkdir -p outputs/.usage
          claude \
            --model claude-opus-4-7 \
            --max-turns 25 \
            --print \
            --output-format stream-json \
            --verbose \
            --permission-mode acceptEdits \
            "$PROMPT" \
            > "/tmp/claude-verify-${{ matrix.lens }}-events.ndjson"
          # NB: direct `>` redirect, NOT `| tee`. With `set -o pipefail`
          # (bash default in workflow steps), Opus + stream-json + tee
          # caused SIGPIPE death when the terminal couldn't keep up with
          # verbose event output. SDET subagent of run 27237077229 was
          # killed after ~7s of LLM activity with the tee pattern. Direct
          # redirect loses live CI log visibility for the Claude turn
          # stream but the NDJSON is captured in the file for cost-capture.

      - name: Capture Claude usage stats (cost tracking)
        continue-on-error: true
        env:
          LENS: ${{ matrix.lens }}
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          EVENTS="/tmp/claude-verify-${LENS}-events.ndjson"
          if [ ! -s "$EVENTS" ]; then
            echo "::warning::No claude events captured for lens ${LENS}"
            exit 0
          fi
          FINAL=$(grep -E '"usage"' "$EVENTS" | tail -1 || true)
          if [ -z "$FINAL" ]; then
            echo "::warning::No event with usage object for lens ${LENS}"
            exit 0
          fi
          echo "$FINAL" > "/tmp/claude-verify-${LENS}-result.json"
          npx tsx scripts/extract-claude-usage.ts \
            --from "/tmp/claude-verify-${LENS}-result.json" \
            --out "outputs/.usage/${INPUT_BASENAME}-verify-${LENS}.json" \
            --tolerant

      - name: Sub-agent report secret scan (mirror Stage 0)
        env:
          LENS: ${{ matrix.lens }}
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          # Opus may quote source-test fragments that contain credentials
          # (especially when discussing what was migrated). Mirror the input
          # + Stage 2 output secret-scan patterns. Warn but don't block —
          # the verify report is informational, not a final artifact.
          REPORT="outputs/reports/${INPUT_BASENAME}-verify-${LENS}.md"
          if [ ! -f "$REPORT" ]; then exit 0; fi
          declare -a PATTERNS=(
            'AKIA[0-9A-Z]{16}|AWS access key'
            'sk_live_[0-9a-zA-Z]{24,}|Stripe live secret key'
            'pk_live_[0-9a-zA-Z]{24,}|Stripe live publishable key'
            'ghp_[A-Za-z0-9]{36}|GitHub PAT'
            'github_pat_[A-Za-z0-9_]{82}|GitHub fine-grained PAT'
            'xox[abprs]-[A-Za-z0-9-]{10,}|Slack token'
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}|Anthropic API key'
            'sk-proj-[A-Za-z0-9_-]{40,}|OpenAI project key'
          )
          for entry in "${PATTERNS[@]}"; do
            PAT="${entry%|*}"
            LABEL="${entry#*|}"
            if grep -qnE "$PAT" "$REPORT"; then
              echo "::warning file=$REPORT::Verifier (${LENS}) emitted possible $LABEL — Opus may have quoted source verbatim. Review before merging the code PR."
            fi
          done

      - name: Upload sub-agent report
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: verify-report-${{ matrix.lens }}
          path: outputs/reports/${{ inputs.input_basename }}-verify-${{ matrix.lens }}.md
          if-no-files-found: error
          retention-days: 30

      - name: Upload sub-agent usage stats (cost tracking)
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: verify-usage-${{ matrix.lens }}
          path: outputs/.usage/${{ inputs.input_basename }}-verify-${{ matrix.lens }}.json
          if-no-files-found: ignore
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Tally — runs after BOTH sub-agents complete (needs:). Aggregates the two
  # verdicts via the consensus ladder, writes a combined report at the
  # legacy path (outputs/reports/<basename>-verify.md) so the existing
  # persist-verify-metrics + PR-comment pipeline continues to work unchanged,
  # then applies labels + fires auto-regen on START OVER.
  #
  # if: always() — we MUST run the tally even if one sub-agent failed. A
  # missing sub-agent report is itself a signal (the tally treats it as
  # START OVER, conservative fallback).
  # ---------------------------------------------------------------------------
  tally:
    runs-on: ubuntu-latest
    needs: verify-subagent
    if: always()
    outputs:
      final_verdict: ${{ steps.tally.outputs.final_verdict }}
      transient_start_over: ${{ steps.tally.outputs.transient_start_over }}
      verify_attempt: ${{ steps.tally.outputs.verify_attempt }}
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          # Default 'main' preserves the post-merge-audit design that
          # migrate.yml → trigger-verify relies on. Override via the
          # workflow_dispatch `pr_branch` input when verifying an unmerged
          # Stage 2 PR (e.g. `migrator/code-<name>`); the spec + report
          # live on that branch until human review merges them.
          ref: ${{ inputs.pr_branch || 'main' }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install project deps
        run: npm ci

      - name: Download SDET sub-agent report
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        # continue-on-error: a missing report is intentionally handled by the
        # tally script below (counts as START OVER, conservative fallback).
        continue-on-error: true
        with:
          name: verify-report-sdet
          path: outputs/reports/

      - name: Download Code Review sub-agent report
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        continue-on-error: true
        with:
          name: verify-report-code-review
          path: outputs/reports/

      - name: Download sub-agent usage artifacts (cost tracking)
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        continue-on-error: true
        with:
          name: verify-usage-sdet
          path: outputs/.usage/

      - name: Download Code Review usage artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        continue-on-error: true
        with:
          name: verify-usage-code-review
          path: outputs/.usage/

      - name: Combine sub-agent usage stats (sum across lenses)
        if: always()
        continue-on-error: true
        env:
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          # Both lenses use the same model (Opus 4.7), so we sum input/output
          # tokens across the two and write a single combined usage file.
          # persist-verify-metrics writes ONE row per input_basename — the
          # combined cost is what matters for the verifications table.
          SDET="outputs/.usage/${INPUT_BASENAME}-verify-sdet.json"
          CR="outputs/.usage/${INPUT_BASENAME}-verify-code-review.json"
          if [ ! -f "$SDET" ] && [ ! -f "$CR" ]; then
            echo "No verify usage files captured — skipping combine"
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const load = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
            const s = load('$SDET');
            const c = load('$CR');
            const any = s ?? c;
            if (!any) process.exit(0);
            const combined = {
              model: any.model,
              input_tokens: (s?.input_tokens ?? 0) + (c?.input_tokens ?? 0),
              output_tokens: (s?.output_tokens ?? 0) + (c?.output_tokens ?? 0),
              cache_read_tokens: (s?.cache_read_tokens ?? 0) + (c?.cache_read_tokens ?? 0),
              cache_creation_tokens: (s?.cache_creation_tokens ?? 0) + (c?.cache_creation_tokens ?? 0),
            };
            fs.writeFileSync('outputs/.usage/${INPUT_BASENAME}-verify.json', JSON.stringify(combined, null, 2));
            console.log('Combined verify usage: model=' + combined.model + ', in=' + combined.input_tokens + ', out=' + combined.output_tokens);
          "

      - name: Tally verdicts & write combined report
        id: tally
        env:
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          # ------------------------------------------------------------------
          # Tally logic — the CANDOR consensus ladder.
          #
          # Each sub-agent emits exactly one `- Verdict: <SHIP IT|FIX FIRST|
          # START OVER>` line. The tally produces the final verdict by:
          #
          #   SHIP_COUNT = number of sub-agents that voted SHIP IT
          #
          #   SHIP_COUNT == 2 → SHIP IT  (full agreement, low false-positive)
          #   SHIP_COUNT == 1 → FIX FIRST (one lens flagged something concrete)
          #   SHIP_COUNT == 0 → START OVER (no SHIP IT votes — reject)
          #
          # Missing sub-agent report: counts as START OVER for that lens
          # (conservative fallback — silent failure must not pass). This is
          # the same posture migrate.yml takes when Stage 2 produces no
          # report: assume the worst and block.
          # ------------------------------------------------------------------
          SDET_REPORT="outputs/reports/${INPUT_BASENAME}-verify-sdet.md"
          CR_REPORT="outputs/reports/${INPUT_BASENAME}-verify-code-review.md"
          COMBINED="outputs/reports/${INPUT_BASENAME}-verify.md"

          parse_verdict() {
            local file="$1"
            if [ ! -f "$file" ]; then
              echo "START OVER"
              return
            fi
            local v
            # Accept multiple shapes Sonnet/Opus produce in practice:
            #   `- Verdict: SHIP IT`
            #   `Verdict: SHIP IT`
            #   `## Verdict: FIX FIRST` (markdown H2 header form — bad-PW run
            #      27294558731 CR report)
            #   `Verdict: **SHIP IT**` (markdown bold)
            # Strip leading hashes (##), leading dash, leading **, and any trailing
            # markdown/parens.
            v=$(grep -iE '^(#+ )?(- )?Verdict:' "$file" | head -n1 \
                | sed -E 's/^#+[[:space:]]+//' \
                | sed -E 's/^(- )?[Vv]erdict:[[:space:]]+//' \
                | sed -E 's/^\*\*//; s/\*\*//g' \
                | sed -E 's/[[:space:]]*\(.*$//' \
                | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' \
                || true)
            case "$v" in
              "SHIP IT"|"FIX FIRST"|"START OVER") echo "$v" ;;
              *) echo "START OVER" ;;   # unparseable → conservative
            esac
          }

          SDET_VERDICT=$(parse_verdict "$SDET_REPORT")
          CR_VERDICT=$(parse_verdict "$CR_REPORT")

          SHIP_COUNT=0
          [ "$SDET_VERDICT" = "SHIP IT" ] && SHIP_COUNT=$((SHIP_COUNT + 1))
          [ "$CR_VERDICT"   = "SHIP IT" ] && SHIP_COUNT=$((SHIP_COUNT + 1))

          # Calibration update (2026-06-10, PR #13 closure):
          # The original ladder treated 0/2 SHIP IT as START OVER regardless
          # of whether the lenses said FIX FIRST or START OVER. That over-
          # rejected: when both lenses agree "human adjudication needed, no
          # regeneration" (FIX FIRST + FIX FIRST), they were treated as
          # "regenerate" (START OVER). PR #13 verify run 27240945253 hit
          # this exactly — both lenses gave FIX FIRST on report-metric
          # accuracy (no block-severity findings on the spec itself),
          # auto-regen fired anyway.
          #
          # New rule: take the MAX SEVERITY across lenses.
          #   SHIP IT + SHIP IT       → SHIP IT
          #   SHIP IT + FIX FIRST     → FIX FIRST
          #   SHIP IT + START OVER    → START OVER (one strong reject)
          #   FIX FIRST + FIX FIRST   → FIX FIRST (no lens wants regen)
          #   FIX FIRST + START OVER  → START OVER
          #   START OVER + START OVER → START OVER
          #
          # SHIP_COUNT preserved for backwards-compat in the report header.
          if [ "$SDET_VERDICT" = "START OVER" ] || [ "$CR_VERDICT" = "START OVER" ]; then
            FINAL_VERDICT="START OVER"
          elif [ "$SDET_VERDICT" = "FIX FIRST" ] || [ "$CR_VERDICT" = "FIX FIRST" ]; then
            FINAL_VERDICT="FIX FIRST"
          else
            FINAL_VERDICT="SHIP IT"
          fi

          echo "SDET verdict:        $SDET_VERDICT"
          echo "Code Review verdict: $CR_VERDICT"
          echo "Ship count:          $SHIP_COUNT/2"
          echo "Final verdict:       $FINAL_VERDICT"

          # Transient-START-OVER detector. Parser bugs (PR #69 H2 form) and
          # one-off Opus hallucinations have produced spurious START OVER
          # verdicts; one retry at the same pr_branch with a fresh Opus
          # session disambiguates. Cap at attempt 2 — beyond that the
          # verdict is real (deterministic) and human review takes over.
          ATTEMPT="${{ inputs.verify_attempt || '1' }}"
          if [ "$FINAL_VERDICT" = "START OVER" ] && [ "$ATTEMPT" = "1" ]; then
            echo "transient_start_over=true" >> "$GITHUB_OUTPUT"
          else
            echo "transient_start_over=false" >> "$GITHUB_OUTPUT"
          fi

          # Expose for downstream steps (we still need it after the combined
          # report is parsed by the labelling step).
          {
            echo "sdet_verdict=$SDET_VERDICT"
            echo "code_review_verdict=$CR_VERDICT"
            echo "ship_count=$SHIP_COUNT"
            echo "final_verdict=$FINAL_VERDICT"
            echo "verify_attempt=$ATTEMPT"
          } >> "$GITHUB_OUTPUT"

          # ------------------------------------------------------------------
          # Write the combined report. Keep the legacy path
          # (<basename>-verify.md) and legacy verdict-line shape so
          # persist-verify-metrics.ts, the PR comment step, and any external
          # tooling that already parses `- Verdict:` continue to work
          # without changes. Include both sub-reports verbatim as the body
          # so reviewers see the full per-lens reasoning on the code PR.
          # ------------------------------------------------------------------
          mkdir -p "$(dirname "$COMBINED")"
          {
            echo "# Verification report (CANDOR 2-agent consensus): ${INPUT_BASENAME}"
            echo ""
            echo "## Consensus tally"
            echo "- SDET sub-agent verdict: ${SDET_VERDICT}"
            echo "- Code Review sub-agent verdict: ${CR_VERDICT}"
            echo "- Ship count: ${SHIP_COUNT}/2"
            echo ""
            echo "- Verdict: ${FINAL_VERDICT}"
            echo ""
            echo "_Ladder: 2/2 SHIP IT → SHIP IT; 1/2 → FIX FIRST; 0/2 → START OVER._"
            echo ""
            echo "---"
            echo ""
            echo "## SDET sub-agent report"
            echo ""
            if [ -f "$SDET_REPORT" ]; then
              cat "$SDET_REPORT"
            else
              echo "_SDET sub-agent did not produce a report. Counted as START OVER (conservative fallback)._"
            fi
            echo ""
            echo "---"
            echo ""
            echo "## Code Review sub-agent report"
            echo ""
            if [ -f "$CR_REPORT" ]; then
              cat "$CR_REPORT"
            else
              echo "_Code Review sub-agent did not produce a report. Counted as START OVER (conservative fallback)._"
            fi
          } > "$COMBINED"

          # Replicate the "## Disagreements" section by concatenating both
          # sub-reports' tables. persist-verify-metrics.ts counts numeric
          # rows under `## Disagreements`, so the combined report needs ONE
          # such section to keep the count accurate. We synthesise it from
          # the two per-lens "Disagreements (... lens)" tables.
          {
            echo ""
            echo "---"
            echo ""
            echo "## Disagreements"
            echo ""
            echo "_Combined from both lenses; row numbers re-indexed within each lens block._"
            echo ""
            if [ -f "$SDET_REPORT" ]; then
              awk '/^## Disagreements/{flag=1; next} flag && /^## /{flag=0} flag' "$SDET_REPORT"
            fi
            if [ -f "$CR_REPORT" ]; then
              awk '/^## Disagreements/{flag=1; next} flag && /^## /{flag=0} flag' "$CR_REPORT"
            fi
          } >> "$COMBINED"

      - name: Combined report secret scan (defence-in-depth)
        env:
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          # Each sub-agent already ran its own secret scan, but the combined
          # report includes verbatim concatenation — re-scan the combined to
          # catch any artifact of the concatenation step itself (e.g., the
          # secret-scan pattern matched a fragment border).
          REPORT="outputs/reports/${INPUT_BASENAME}-verify.md"
          if [ ! -f "$REPORT" ]; then exit 0; fi
          declare -a PATTERNS=(
            'AKIA[0-9A-Z]{16}|AWS access key'
            'sk_live_[0-9a-zA-Z]{24,}|Stripe live secret key'
            'pk_live_[0-9a-zA-Z]{24,}|Stripe live publishable key'
            'ghp_[A-Za-z0-9]{36}|GitHub PAT'
            'github_pat_[A-Za-z0-9_]{82}|GitHub fine-grained PAT'
            'xox[abprs]-[A-Za-z0-9-]{10,}|Slack token'
            'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}|Anthropic API key'
            'sk-proj-[A-Za-z0-9_-]{40,}|OpenAI project key'
          )
          for entry in "${PATTERNS[@]}"; do
            PAT="${entry%|*}"
            LABEL="${entry#*|}"
            if grep -qnE "$PAT" "$REPORT"; then
              echo "::warning file=$REPORT::Verifier (combined) emitted possible $LABEL — Opus may have quoted source verbatim. Review before merging the code PR."
            fi
          done

      - name: Persist verify metrics
        env:
          METRICS_DB: outputs/.metrics.db
          GITHUB_SHA: ${{ github.sha }}
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          # v1 ROADMAP "Metrics dashboard" — write verify row to local SQLite.
          # Runs AFTER the secret scan (so manual edits to verdict get captured)
          # but BEFORE the PR-comment + label step (so a label-failure does not
          # block the metrics write). Non-fatal on error — DB is a cache.
          # We read the COMBINED report so the verdict reflects the tally
          # (not either individual sub-agent's verdict).
          REPORT="outputs/reports/${INPUT_BASENAME}-verify.md"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::persist-verify-metrics: report $REPORT missing — skipping metrics write"
            exit 0
          fi
          USAGE_FILE="outputs/.usage/${INPUT_BASENAME}-verify.json"
          USAGE_ARG=""
          [ -f "$USAGE_FILE" ] && USAGE_ARG="--usage $USAGE_FILE"
          # shellcheck disable=SC2086 # USAGE_ARG intentionally word-split
          npx tsx scripts/persist-verify-metrics.ts --report "$REPORT" $USAGE_ARG || \
            echo "::warning::persist-verify-metrics failed (non-fatal)"

      - name: Comment verify findings on code PR
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BASENAME: ${{ inputs.input_basename }}
        shell: bash
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list --state open --label "migrator:code" \
            --search "$INPUT_BASENAME" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "::warning::No open code PR found for $INPUT_BASENAME"
            exit 0
          fi
          REPORT="outputs/reports/${INPUT_BASENAME}-verify.md"
          if [ ! -f "$REPORT" ]; then
            # Tally stage failed silently — no combined report written.
            # Without this guard, `gh pr comment --body-file` would fail
            # mid-step and the case statement wouldn't run, leaving the PR
            # unlabeled.
            echo "::error::Combined verify report $REPORT was not produced by the tally stage. Cannot label code PR — fall back to manual review."
            exit 1
          fi
          gh pr comment "$PR_NUMBER" --body-file "$REPORT"
          # Parse 3-level verdict from the combined report. The tally step
          # emits exactly one `- Verdict: <X>` line in the consensus tally
          # block, so the same regex as the single-Opus design works.
          VERDICT=$(grep -iE '^(- )?Verdict:' "$REPORT" | head -n1 \
              | sed -E 's/^(- )?[Vv]erdict:[[:space:]]+//' \
              | sed -E 's/^\*\*//; s/\*\*//g' \
              | sed -E 's/[[:space:]]*\(.*$//' \
              | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')
          case "$VERDICT" in
            "START OVER")
              # ---------------------------------------------------------------
              # Auto-regen on START OVER (closes the manual /regenerate loop).
              #
              # Counter mechanism: every auto-fired dispatch leaves a
              # `regen-attempt:N` label on this code PR. On the NEXT START OVER
              # for the same code PR, we count existing labels and:
              #   count == 0 → fire dispatch, add `regen-attempt:1`
              #   count == 1 → fire dispatch, add `regen-attempt:2`
              #   count == 2 → fire dispatch, add `regen-attempt:3` (last shot)
              #   count >= 3 → HALT — add `regen-attempt:max-reached`, require
              #                a human to either /regenerate manually or close.
              #
              # This bounds the worst case at 3 dispatches per input (so Opus
              # can't spin Sonnet in an infinite "still bad" loop). The cap
              # could ALSO be enforced inside plan.yml by reading
              # client_payload.regen_attempt (defense-in-depth), but that
              # change is out of scope here — this workflow alone enforces it.
              #
              # Auth: `gh api repos/{owner}/{repo}/dispatches` requires
              # `contents: write` for github.token — granted at the workflow
              # `permissions:` block above. Repository_dispatch fired with
              # github.token DOES re-trigger downstream `repository_dispatch`
              # listeners (this is the documented carve-out; `push` listeners
              # are the special case that does NOT re-trigger). So plan.yml's
              # `regenerate-plan` handler will fire from this dispatch.
              # ---------------------------------------------------------------
              gh pr edit "$PR_NUMBER" --add-label "verify:start-over"
              # Count prior auto-regen attempts.
              REGEN_COUNT=$(gh pr view "$PR_NUMBER" --json labels \
                --jq '[.labels[].name | select(startswith("regen-attempt:") and . != "regen-attempt:max-reached")] | length')
              REGEN_COUNT=${REGEN_COUNT:-0}
              echo "Auto-regen counter: $REGEN_COUNT prior attempts on PR #$PR_NUMBER"
              if [ "$REGEN_COUNT" -ge 3 ]; then
                # Cap hit — stop the loop, require human.
                gh pr edit "$PR_NUMBER" --add-label "regen-attempt:max-reached" 2>/dev/null || true
                echo "::error::Auto-regen cap (3/3) hit for PR #$PR_NUMBER. Human review required — comment /regenerate manually if a 4th attempt is warranted."
                exit 1
              fi
              # Parse input_path from the code PR body (same format as the
              # plan PR — migrate.yml writes **Input:** `<path>` on its own
              # line; see regenerate-dispatch.yml step 'Verify PR has
              # migrator:plan label + extract input path' for the canonical
              # regex pattern this mirrors).
              PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
              INPUT_PATH=$(printf '%s\n' "$PR_BODY" | grep -oE '\*\*Input:\*\* `[^`]+`' | head -1 | sed -E 's/^\*\*Input:\*\* `([^`]+)`$/\1/')
              if [ -z "$INPUT_PATH" ]; then
                echo "::error::Could not parse **Input:** \`<path>\` from PR #$PR_NUMBER body — cannot auto-regen. Falling back to manual /regenerate."
                echo "::error::Verifier verdict: START OVER. Code PR #$PR_NUMBER blocked from merge."
                exit 1
              fi
              NEXT_ATTEMPT=$((REGEN_COUNT + 1))
              # Build feedback payload: full combined verify report as the
              # freeform feedback text that plan.yml will splice into the
              # analyze prompt (matches client_payload.slash_command.args.all
              # shape used by the manual /regenerate flow — see plan.yml
              # step 'Run Claude (analyze stage)' env REGENERATE_FEEDBACK).
              # The combined report includes BOTH sub-agents' reasoning, so
              # Stage 2 gets both lenses' feedback in one shot.
              FEEDBACK=$(cat "$REPORT")
              # Construct the dispatch payload. plan.yml reads:
              #   client_payload.slash_command.args.named.input_path
              #   client_payload.slash_command.args.all
              # so we mirror that shape exactly. `regen_attempt` is a
              # defense-in-depth signal for plan.yml to OPTIONALLY enforce
              # the same cap on its side; this workflow's counter is
              # authoritative.
              PAYLOAD=$(jq -nc \
                --arg input_path "$INPUT_PATH" \
                --arg all "$FEEDBACK" \
                --argjson regen_attempt "$NEXT_ATTEMPT" \
                '{event_type: "regenerate-plan",
                  client_payload: {
                    slash_command: {
                      command: "regenerate",
                      args: {
                        named: {input_path: $input_path},
                        all: $all
                      }
                    },
                    regen_attempt: $regen_attempt,
                    triggered_by: "verify-auto-regen"
                  }
                 }')
              # Fire repository_dispatch on this repo. `gh api` POSTs to
              # /repos/{owner}/{repo}/dispatches which fires the event.
              if printf '%s' "$PAYLOAD" | gh api \
                  --method POST \
                  -H "Accept: application/vnd.github+json" \
                  "repos/${{ github.repository }}/dispatches" \
                  --input -; then
                gh pr edit "$PR_NUMBER" --add-label "regen-attempt:$NEXT_ATTEMPT" 2>/dev/null || true
                gh pr edit "$PR_NUMBER" --add-label "verify:auto-regen-fired" 2>/dev/null || true
                echo "::notice::Auto-regen fired (attempt $NEXT_ATTEMPT/3). New plan PR will be opened by plan.yml. This code PR will be closed when the new code PR is approved."
              else
                echo "::error::repository_dispatch POST failed — falling back to manual /regenerate. Reviewer must comment /regenerate on the plan PR."
              fi
              # Always exit 1: this verify run failed (START OVER).
              # Even on successful dispatch, this code PR check stays red so
              # branch protection holds. The NEW code PR (from the dispatched
              # plan.yml run) will get its own verify check.
              echo "::error::Verifier verdict: START OVER. Code PR #$PR_NUMBER blocked from merge."
              exit 1
              ;;
            "FIX FIRST")
              gh pr edit "$PR_NUMBER" --add-label "verify:fix-first"
              # FIX FIRST = soft block. Workflow succeeds (check passes) but
              # the label signals human reviewer must adjudicate. Branch
              # protection can also be configured to require the label
              # absence via a separate workflow if you want hard-block here.
              echo "::warning::Verifier verdict: FIX FIRST. Reviewer should adjudicate before merge."
              ;;
            "SHIP IT")
              gh pr edit "$PR_NUMBER" --add-label "verify:ship-it"
              # SHIP IT trumps the confidence:low label. Both Opus sub-agents
              # reviewed the output independently and approved — confidence
              # < 0.7 was a false alarm from the Sonnet-side metric. Remove
              # the confidence:low label so reviewers don't see conflicting
              # signals. 'gh pr edit --remove-label' is idempotent (no-op if
              # absent). Under CANDOR, SHIP IT means 2/2 lenses agreed — a
              # stronger signal than the single-Opus design.
              gh pr edit "$PR_NUMBER" --remove-label "confidence:low" 2>/dev/null || true
              gh pr edit "$PR_NUMBER" --add-label "confidence:high" 2>/dev/null || true
              echo "::notice::Verifier verdict: SHIP IT (2/2 lenses). confidence:low → confidence:high (CANDOR override)."
              ;;
            *)
              echo "::warning::Unrecognized verdict '$VERDICT' — no label applied"
              ;;
          esac

  # ---------------------------------------------------------------------------
  # Retry transient START OVER. Parser bugs (PR #69 H2 verdict form) and
  # one-off Opus session hallucinations have produced spurious START OVER
  # tallies in practice. ONE rerun at the same pr_branch with a fresh Opus
  # session disambiguates: if the same verdict comes back, it's real and
  # auto-regen / human review takes over. Cap at attempt 2 by passing
  # verify_attempt=2 to the rerun, which prevents infinite loops.
  # ---------------------------------------------------------------------------
  retry-transient-start-over:
    runs-on: ubuntu-latest
    needs: tally
    if: needs.tally.outputs.transient_start_over == 'true'
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'verify.yml',
              ref: 'main',
              inputs: {
                input_basename: '${{ inputs.input_basename }}',
                generate_confidence: '${{ inputs.generate_confidence }}',
                pr_branch: '${{ inputs.pr_branch }}',
                verify_attempt: '2',
              },
            });
            core.notice('Transient START OVER detected (attempt 1). Re-dispatched verify with verify_attempt=2 on same pr_branch — fresh Opus session disambiguates parser/hallucination cases.');
